syntax = "proto3";
package integration;

import "google/protobuf/timestamp.proto";

// Comprehensive: nested structs, repeated message, map, WKT, and optional fields.

message OrderItem {
    string  product_id = 1;
    int32   quantity   = 2;
    double  unit_price = 3;
    optional string note = 4;   // nullable utf8
}

message Order {
    string                    order_id      = 1;
    google.protobuf.Timestamp created_at    = 2;   // timestamp(NANO)
    repeated OrderItem        items         = 3;   // list(struct<...>)
    map<string, int32>        tags          = 4;   // map(utf8, int32)
    optional string           customer_note = 5;   // nullable utf8
}
