syntax = "proto3";
// Own package (not bare `integration`) so this fixture's `Telemetry`
// message does not collide with telemetry.proto's `integration.Telemetry`
// when both generated headers are linked into the same test binary. Two
// distinct `fletcher_gen::integration::Telemetry` definitions would be an
// ODR violation — UB that corrupted the stack on MSVC.
package integration.pubsub;

import "google/protobuf/empty.proto";

// Self-contained message for pub/sub integration test.
message Telemetry {
    int32  device_id   = 1;
    double value       = 2;
    int64  timestamp   = 3;
    string metric_name = 4;
}

// Valid pub/sub service: client-streaming, returns Empty.
service TelemetryFeed {
    rpc TelemetryStream(stream Telemetry) returns (google.protobuf.Empty);
}
