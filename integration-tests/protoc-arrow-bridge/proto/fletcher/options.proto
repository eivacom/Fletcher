// Custom options for the Fletcher protoc plugin.
// Proto2 syntax is required for 'extend'.
syntax = "proto2";
package fletcher;

import "google/protobuf/descriptor.proto";

// Default CRS for all GeoArrow fields in the message.
// Value is a CRS identifier resolved at schema-construction time,
// e.g. "EPSG:4326" (looked up to PROJJSON) or raw PROJJSON.
extend google.protobuf.MessageOptions {
    optional string default_crs = 50001;
}

// CRS override for a single GeoArrow field.
// Takes precedence over the message-level default_crs.
extend google.protobuf.FieldOptions {
    optional string crs = 50002;
}
