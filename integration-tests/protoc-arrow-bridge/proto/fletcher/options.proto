//
// Custom options for the Fletcher protoc plugin.
// Proto2 syntax is required for 'extend'.
syntax = "proto2";
package fletcher;

import "google/protobuf/descriptor.proto";

// See docs/fletcher-options.md for the full specification.

extend google.protobuf.MessageOptions {
    // Flatten a single-field message wrapper into its inner type.
    optional bool flatten = 50000;
}

extend google.protobuf.FieldOptions {
    // Inline the referenced message's fields into the enclosing message.
    optional bool flatten_field = 50000;
}
