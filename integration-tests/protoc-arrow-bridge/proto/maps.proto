syntax = "proto3";
package integration;

// map<K,V> fields with scalar values.
// Maps produce arrow::map(field("key", K_type, false), field("value", V_type, true))
// columns — key non-nullable (Arrow spec), value nullable (matches the nanoarrow schema).
message Metrics {
    string              resource_id = 1;
    map<string, double> gauges      = 2;   // map(utf8, float64)
    map<string, int64>  counters    = 3;   // map(utf8, int64)
}
