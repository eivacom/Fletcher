//
// RBA-4a forcing fixture: the struct + repeated-scalar + repeated-struct slice
// of AccessorTest.CompositeColumnsReadColumnOriented.
//
// Covered RBA-4a constructs (maps + nested lists are RBA-4b and intentionally
// absent here):
//   - STRUCT, cross-file, >= 2 levels: `outer` references Outer (Outer->Inner->
//     leaf) from accessor_geo.proto, so the deep chain a.outer(row).inner().leaf()
//     exercises recursive RowView composition AND a cross-file accessor include.
//   - nullable 1:1 STRUCT: `maybe_outer` (proto3 `optional`) maps to a nullable
//     struct field; a null row must yield std::nullopt (B2 no-read-through-null).
//   - non-nullable STRUCT: `outer` (singular) maps to a non-nullable struct field;
//     a runtime null element must make Make() return an error (D-RBA-4 recursed).
//   - REPEATED_SCALAR: `readings` (list<double>) — size / empty / element reads /
//     per-element is_null(j).
//   - REPEATED_STRUCT: `track` (list<Inner>) — span[j]==std::nullopt for a null
//     struct element (element-level no-read-through-null via the inner accessor).
//   - ROW-NULLABLE REPEATED collections via optional flatten-wrappers: an
//     `optional <flatten-wrapper-of-repeated>` field resolves (type_mapper
//     MapFlattenedSingular) to a REPEATED_SCALAR/REPEATED_STRUCT with nullable=
//     true, so the getter returns std::optional<Span> and a null list row yields
//     std::nullopt (B2 no-read-through-null at the list-row level).
syntax = "proto3";
package integration;

import "accessor_geo.proto";
import "fletcher/options.proto";

// Flatten-wrappers: a single repeated field, so an `optional <Wrapper>` field
// resolves to a row-nullable repeated collection (the wrapper is stripped).
message ReadingList {
    option (fletcher.flatten) = true;
    repeated double values = 1;  // -> REPEATED_SCALAR list<double>
}

message TrackList {
    option (fletcher.flatten) = true;
    repeated Inner points = 1;  // -> REPEATED_STRUCT list<struct<leaf:int32>>
}

message CompositeRow {
    // Non-nullable cross-file struct, >= 2 levels deep (Outer -> Inner -> leaf).
    Outer outer = 1;

    // Nullable 1:1 struct (proto3 optional) — null row -> std::nullopt.
    optional Outer maybe_outer = 2;

    // Repeated scalar (non-nullable list): list<double>.
    repeated double readings = 3;

    // Repeated struct (non-nullable list): list<Inner>.
    repeated Inner track = 4;

    // Row-nullable REPEATED_SCALAR via optional flatten-wrapper: null row ->
    // std::optional<ScalarSpan> == std::nullopt.
    optional ReadingList opt_readings = 5;

    // Row-nullable REPEATED_STRUCT via optional flatten-wrapper: null row ->
    // std::optional<StructSpan> == std::nullopt.
    optional TrackList opt_track = 6;
}
