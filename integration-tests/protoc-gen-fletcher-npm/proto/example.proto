syntax = "proto3";

package example;

// Minimal message used solely to verify protoc-gen-fletcher's TypeScript
// output: covers a scalar, a string, and a repeated scalar so the
// generated TypedSchema's `fields` array has more than one entry to
// inspect at runtime.
message Greeting {
  string name = 1;
  int32 priority = 2;
  repeated int32 tags = 3;
}
