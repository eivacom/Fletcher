// Minimal proto used by the cross-language byte-compat integration test
// (protoc-generated TypeScript decode/encode against the C++ codec).
// Covers the basic combinations of the positional wire format:
//   - fixed-size scalar (int32, double, bool)
//   - variable-size scalar (string)
//   - list of fixed-size scalars (repeated int32)
syntax = "proto3";

package integration;

message Telemetry {
    int32 sensor_id = 1;
    double temperature = 2;
    string label = 3;
    bool valid = 4;
    repeated int32 readings = 5;
}
