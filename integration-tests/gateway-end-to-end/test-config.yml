# Gateway configuration used by the end-to-end integration test.
# `gateway --config <this file>` pre-creates the topic listed below
# with a three-field schema (int32 / float64 / utf8) that exercises
# the null bitfield, fixed-width, and variable-length paths in one
# shot.

topics:
  - name: telemetry
    fields:
      - name: sensor_id
        type: int32
      - name: temperature
        type: float64
      - name: label
        type: utf8
