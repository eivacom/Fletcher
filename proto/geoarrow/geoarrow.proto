// GeoArrow geometry types for use with protoc-gen-fletcher.
//
// When a .proto field references one of these message types, the Fletcher
// protoc plugin generates Arrow schemas annotated with the corresponding
// GeoArrow extension type metadata (ARROW:extension:name).
//
// Coordinate struct messages (Point, PointZ, Box, BoxZ) generate normal
// ArrowRow classes.  Wrapper messages (LineString, MultiPoint, etc.) are
// collapsed by the plugin into list fields — no ArrowRow class is generated
// for them.
//
// See https://geoarrow.org for the full GeoArrow specification.

syntax = "proto3";
package geoarrow;

// ---------------------------------------------------------------------------
// XY coordinate types
// ---------------------------------------------------------------------------

// 2D point — maps to geoarrow.point (Struct<x: double, y: double>).
message Point {
    double x = 1;
    double y = 2;
}

// Axis-aligned bounding box — maps to geoarrow.box.
message Box {
    double xmin = 1;
    double ymin = 2;
    double xmax = 3;
    double ymax = 4;
}

// Ordered sequence of vertices — maps to geoarrow.linestring
// (List<Struct<x: double, y: double>>).
// Collapsed by protoc-gen-fletcher: no ArrowRow class is generated.
message LineString {
    repeated Point vertices = 1;
}

// Collection of points — maps to geoarrow.multipoint
// (List<Struct<x: double, y: double>>).
// Collapsed by protoc-gen-fletcher: no ArrowRow class is generated.
message MultiPoint {
    repeated Point points = 1;
}

// ---------------------------------------------------------------------------
// XYZ coordinate types
// ---------------------------------------------------------------------------

// 3D point — maps to geoarrow.point (Struct<x: double, y: double, z: double>).
message PointZ {
    double x = 1;
    double y = 2;
    double z = 3;
}

// 3D axis-aligned bounding box — maps to geoarrow.box.
message BoxZ {
    double xmin = 1;
    double ymin = 2;
    double zmin = 3;
    double xmax = 4;
    double ymax = 5;
    double zmax = 6;
}

// 3D line string — maps to geoarrow.linestring.
// Collapsed by protoc-gen-fletcher: no ArrowRow class is generated.
message LineStringZ {
    repeated PointZ vertices = 1;
}

// 3D multi-point — maps to geoarrow.multipoint.
// Collapsed by protoc-gen-fletcher: no ArrowRow class is generated.
message MultiPointZ {
    repeated PointZ points = 1;
}
