name: "Build and test a Fletcher Conan component on Windows"
description: >-
  Installs Python and Conan, copies the in-repo Conan profiles, then
  builds and tests the specified component against ConanCenter.
  Supports conan-create (default) and conan-install+build modes.
  Callers are responsible for installing MSVC tools and CMake beforehand.

inputs:
  component:
    description: "Source directory name (e.g. core, arrow-bridge)"
    required: true
  conan-profile:
    description: "Conan profile name (must exist in .conan-profiles/)"
    required: false
    default: "Windows-msvc194-x86_64-Release"
  build-mode:
    description: "Build mode: 'create' (default) or 'install-build'"
    required: false
    default: "create"
  conan-version:
    description: "Conan version to install"
    required: false
    default: "2.27.1"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: "3.x"

    - name: Install Conan
      shell: bash
      run: pip install "conan==${{ inputs.conan-version }}"

    - name: Install Conan profiles
      shell: bash
      run: |
        mkdir -p ~/.conan2/profiles
        cp .conan-profiles/* ~/.conan2/profiles/

    - name: Build and test
      shell: bash
      working-directory: ${{ inputs.component }}
      env:
        PROFILE: ${{ inputs.conan-profile }}
        BUILD_MODE: ${{ inputs.build-mode }}
      run: |
        if [[ "$BUILD_MODE" == "install-build" ]]; then
          conan install . --build=missing -pr:a="$PROFILE" -o "&:run_tests=True"
          conan build . -pr:a="$PROFILE" -o "&:run_tests=True"
        else
          conan create . --build=missing -pr:a="$PROFILE" -o "&:run_tests=True"
        fi
