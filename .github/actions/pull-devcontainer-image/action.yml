name: "Pull the pre-built Fletcher devcontainer image"
description: >-
  Logs in to Docker Hub with the eivaorg OAT, pulls the devcontainer image
  just built by the setup-devcontainer-image workflow, and tags it locally as
  `fletcher-build` so the rest of the workflow can
  `docker run --rm ... fletcher-build` exactly the way it used to under
  the previous setup-devcontainer-image action.
  Replaces setup-devcontainer-image, which ran buildx on every
  consumer-workflow job and pulled docker.io/library/ubuntu:24.04
  anonymously — eventually tripping Docker Hub's free-tier
  unauthenticated rate limit when many component workflows triggered
  simultaneously on the same commit.

inputs:
  image:
    description: "Full image reference (output of the devcontainer-image reusable workflow)"
    required: true
  dockerhub-token:
    description: "Docker Hub OAT for the eivaorg organisation"
    required: true

runs:
  using: "composite"
  steps:
    - name: Log in to Docker Hub
      shell: bash
      env:
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub-token }}
      run: echo "$DOCKERHUB_TOKEN" | docker login -u eivaorg --password-stdin

    - name: Pull and retag as fletcher-build
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        docker pull "$IMAGE"
        docker tag "$IMAGE" fletcher-build
