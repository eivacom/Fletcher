name: "Install VS2022 Build Tools (v143)"
description: Installs Visual Studio 2022 Build Tools (v143) and Windows 11 SDK.
runs:
  using: "composite"
  steps:
    - name: Install VS2022 Build Tools (v143)
      shell: pwsh
      run: |
        $vsInstallerUrl = "https://aka.ms/vs/17/release/vs_buildtools.exe"
        $vsInstallerPath = "$env:TEMP\vs_buildtools.exe"
        $installPath = "C:\Program Files\Microsoft Visual Studio\2022\Professional"

        $components = @(
          "Microsoft.VisualStudio.Workload.VCTools",
          "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
          "Microsoft.VisualStudio.Component.VC.ATLMFC",
          "Microsoft.VisualStudio.Component.Windows11SDK.22621"
        )

        $arguments = @(
          "--wait",
          "--norestart",
          "--nocache",
          "--installPath `"$installPath`""
        )

        foreach ($component in $components) {
          $arguments += "--add $component"
        }

        Write-Host "Downloading VS Build Tools..."
        Invoke-WebRequest -Uri $vsInstallerUrl -OutFile $vsInstallerPath

        Write-Host "Installing VS Build Tools to $installPath..."
        Start-Process -FilePath $vsInstallerPath -ArgumentList $arguments -Wait

        Write-Host "VS Build Tools installation complete."
