name: "Check Conan package version is not already published"
description: >-
  Fails if the conan package reference is already published on the conan-eiva
  remote. Prevents accidental re-publishing of an existing version.

inputs:
  conan-ref:
    description: "Conan package reference, e.g. eiva-fletcher-core/0.1.3-alpha"
    required: true

runs:
  using: "composite"
  steps:
    - shell: bash
      env:
        CONAN_REF: ${{ inputs.conan-ref }}
      run: |
        output=$(conan list "$CONAN_REF" -r conan-eiva --format=json)
        # Conan 2 returns the structure:
        #   recipe found:     {"conan-eiva": {"<ref>": {"revisions": {...}}}}
        #   recipe not found: {"conan-eiva": {"<ref>": {"error": "Recipe ... not found"}}}
        # We must distinguish the two — truthiness of the remote entry alone
        # is not enough.
        exists=$(printf '%s' "$output" | python3 -c "import json,sys;d=json.load(sys.stdin);entries=(d.get('conan-eiva') or {}).values();print('yes' if any(isinstance(v,dict) and 'revisions' in v for v in entries) else 'no')")
        if [ "$exists" = "yes" ]; then
          echo "::error::Version '$CONAN_REF' is already published on conan-eiva. Bump the version in conanfile.py to release a new version."
          echo "Existing entries on conan-eiva:"
          echo "$output"
          exit 1
        fi
        echo "Version '$CONAN_REF' is not yet published on conan-eiva — proceeding with upload."
