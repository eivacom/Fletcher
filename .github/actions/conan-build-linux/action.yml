name: "Build and test a Fletcher Conan component on Linux"
description: >-
  Pulls the pre-built devcontainer image, installs Conan inside it, copies
  in-repo Conan profiles, then builds and tests the specified component
  against ConanCenter. Supports conan-create (default) and
  conan-install+build modes. Optionally saves the built Conan package as a
  .tgz in the workspace root.

inputs:
  component:
    description: "Source directory name (e.g. core, arrow-bridge)"
    required: true
  conan-profile:
    description: "Conan profile name (must exist in .conan-profiles/)"
    required: false
    default: "Linux-gcc13-x86_64-Release"
  build-mode:
    description: "Build mode: 'create' (default) or 'install-build'"
    required: false
    default: "create"
  devcontainer-image:
    description: "Full image reference output from setup-devcontainer-image"
    required: true
  dockerhub-token:
    description: "Docker Hub OAT for the eivaorg organisation"
    required: true
  conan-version:
    description: "Conan version to install"
    required: false
    default: "2.27.1"
  artifact-name:
    description: "If set, save the built Conan package as this filename in the workspace root"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Pull devcontainer image
      uses: ./.github/actions/pull-devcontainer-image
      with:
        image: ${{ inputs.devcontainer-image }}
        dockerhub-token: ${{ inputs.dockerhub-token }}

    - name: Build and test
      shell: bash
      env:
        COMPONENT: ${{ inputs.component }}
        PROFILE: ${{ inputs.conan-profile }}
        BUILD_MODE: ${{ inputs.build-mode }}
        CONAN_VERSION: ${{ inputs.conan-version }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          -w "/workspace/${COMPONENT}" \
          -e CONAN_VERSION="${CONAN_VERSION}" \
          -e PROFILE="${PROFILE}" \
          -e BUILD_MODE="${BUILD_MODE}" \
          -e ARTIFACT_NAME="${ARTIFACT_NAME}" \
          fletcher-build \
          bash -c '
            set -e
            pip install "conan==${CONAN_VERSION}"
            mkdir -p ~/.conan2/profiles
            cp /workspace/.conan-profiles/* ~/.conan2/profiles/
            if [[ "${BUILD_MODE}" == "install-build" ]]; then
              conan install . --build=missing -pr:a="${PROFILE}" -o "&:run_tests=True"
              conan build . -pr:a="${PROFILE}" -o "&:run_tests=True"
            else
              conan create . --build=missing -pr:a="${PROFILE}" -o "&:run_tests=True"
            fi
            if [[ -n "${ARTIFACT_NAME}" ]]; then
              REF=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[\"name\"] + \"/\" + d[\"version\"])")
              conan cache save "${REF}" --file "/workspace/${ARTIFACT_NAME}"
            fi
          '
