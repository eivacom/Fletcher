name: "Bootstrap Conan with conan-eiva access"
description: >-
  Generates a token for the eiva conan-configuration repository, installs
  Python + Conan, applies the eiva conan-configuration, and logs into the
  conan-eiva remote. Self-contained — no dependency on third-party Conan
  GitHub Actions.

inputs:
  github-app-client-id:
    description: "GitHub App client ID for accessing eivacom/conan-configuration"
    required: true
  github-app-private-key:
    description: "GitHub App private key matching the client ID above"
    required: true
  conan-eiva-username:
    description: "conan-eiva Artifactory username"
    required: true
  conan-eiva-password:
    description: "conan-eiva Artifactory password"
    required: true
  python-version:
    description: "Python version to install"
    required: false
    default: "3.14.4"
  conan-version:
    description: "Conan version to install"
    required: false
    default: "2.27.1"

runs:
  using: "composite"
  steps:
    - name: Generate token for conan-configuration
      id: generate-token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ inputs.github-app-client-id }}
        private-key: ${{ inputs.github-app-private-key }}
        owner: eivacom
        repositories: conan-configuration

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Conan
      shell: bash
      run: |
        python -m pip install --root-user-action=ignore --no-cache-dir "conan==${{ inputs.conan-version }}"

    - name: Install conan-configuration
      shell: bash
      env:
        GH_APP_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        auth_header=$(printf 'x-access-token:%s' "$GH_APP_TOKEN" | base64 -w0)
        git config --global http.extraHeader "Authorization: Basic $auth_header"
        conan config install https://github.com/eivacom/conan-configuration.git --type git
        # Clear the auth header so subsequent git operations on this runner
        # do not reuse the conan-configuration token.
        git config --global --unset http.extraHeader

    - name: Log in to conan-eiva
      shell: bash
      env:
        CONAN_LOGIN_USERNAME: ${{ inputs.conan-eiva-username }}
        CONAN_LOGIN_PASSWORD: ${{ inputs.conan-eiva-password }}
      run: |
        conan remote login conan-eiva "$CONAN_LOGIN_USERNAME" -p "$CONAN_LOGIN_PASSWORD"
