name: "Detect devcontainer-only change"
description: "Outputs result=true if a pull request changes only files under .devcontainer/. Returns false for non-pull_request events and for PRs that touch any other path."

outputs:
  result:
    description: "'true' if only .devcontainer/ files changed in this PR, 'false' otherwise"
    value: ${{ steps.detect.outputs.result }}

runs:
  using: "composite"
  steps:
    - id: detect
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        # Only pull requests can be devcontainer-only — push/tag/workflow_dispatch always need a full build.
        if [ "$EVENT_NAME" != "pull_request" ]; then
          echo "result=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        files=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')

        # grep -qv exits 0 if any line does NOT start with .devcontainer/  (i.e. the PR touched something else).
        if echo "$files" | grep -qv '^\.devcontainer/'; then
          echo "result=false" >> "$GITHUB_OUTPUT"
        else
          echo "result=true" >> "$GITHUB_OUTPUT"
        fi
