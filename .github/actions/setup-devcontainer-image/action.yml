name: "Set up devcontainer image"
description: "Builds the shared Fletcher devcontainer image on the runner and tags it as `fletcher-build`. Always runs `docker buildx build --cache-from`; BuildKit serves unchanged layers from the Harbor cache (populated by the `build-devcontainer` workflow on `main`), and rebuilds only what actually changed when a PR touches .devcontainer/."

inputs:
  harbor_username:
    description: "Harbor robot username"
    required: true
  harbor_password:
    description: "Harbor robot password"
    required: true

runs:
  using: "composite"
  steps:
    - name: Log in to Harbor
      shell: bash
      env:
        HARBOR_USERNAME: ${{ inputs.harbor_username }}
        HARBOR_PASSWORD: ${{ inputs.harbor_password }}
      run: echo "$HARBOR_PASSWORD" | docker login dockerrepo.eiva.com -u "$HARBOR_USERNAME" --password-stdin

    - name: Build devcontainer image
      shell: bash
      run: |
        docker buildx create --name builder --use
        docker buildx build \
          --network host \
          --cache-from type=registry,ref=dockerrepo.eiva.com/fletcher/devcontainer:cache \
          -t fletcher-build \
          --load \
          .devcontainer
