name: "Detect PR changes"
description: "Outputs devcontainer_only=true when a pull request changes only files under .devcontainer/. Returns 'false' for non-pull_request events (push/tag/workflow_dispatch always build both platforms)."

outputs:
  devcontainer_only:
    description: "'true' if every changed file in the PR is under .devcontainer/, 'false' otherwise"
    # `dorny/paths-filter` only runs on pull_request events here. For other events
    # its outputs are empty strings, so the equality below evaluates to 'false'.
    value: ${{ steps.filter.outputs.non_devcontainer == 'false' && 'true' || 'false' }}

runs:
  using: "composite"
  steps:
    - id: filter
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v3
      with:
        filters: |
          non_devcontainer:
            - '!.devcontainer/**'
            - '**'
