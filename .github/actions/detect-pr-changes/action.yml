name: "Detect PR changes"
description: "Outputs devcontainer_only=true if a pull request changes only files under .devcontainer/. Returns 'false' for non-pull_request events (push/tag/workflow_dispatch always build both platforms)."

outputs:
  devcontainer_only:
    description: "'true' if every changed file in the PR is under .devcontainer/, 'false' otherwise"
    value: ${{ steps.detect.outputs.result }}

runs:
  using: "composite"
  steps:
    - id: detect
      uses: actions/github-script@v8
      with:
        result-encoding: string
        script: |
          if (context.eventName !== 'pull_request') {
            return 'false';
          }
          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner: context.repo.owner,
            repo:  context.repo.repo,
            pull_number: context.payload.pull_request.number,
            per_page: 100,
          });
          const allInDevcontainer = files.every(f => f.filename.startsWith('.devcontainer/'));
          return allInDevcontainer ? 'true' : 'false';
