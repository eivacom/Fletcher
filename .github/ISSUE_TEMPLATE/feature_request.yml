name: Feature request
description: Propose a new feature or enhancement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature request
        Describe what you'd like to see added or changed. Include enough context for maintainers to evaluate the proposal.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which Fletcher component does this relate to?
      options:
        - fletcher-core
        - fletcher-pubsub
        - fletcher-arrow-bridge
        - fletcher-pubsub-arrow
        - fletcher-fastdds-pubsub-provider
        - fletcher-xrcedds-pubsub-provider
        - fletcher-protoc
        - gateway
        - fletcher-gateway-client
        - new component
        - multiple / unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you have in mind. API sketches, pseudocode, or examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about and why you prefer this one.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature.
    validations:
      required: false
