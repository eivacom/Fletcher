name: ci.gateway

concurrency:
  group: ci.gateway-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers; the
          cd.gateway.yml wrapper does the same for tag-push releases.
        required: true
        type: string

# Gateway is distributed as a self-contained deploy that runs with zero setup
# (no LD_LIBRARY_PATH / conanrun). It is built and packaged as a Conan
# `application` package; on tag-push the deploy is produced purely with Conan
# (`conan install --deployer=runtime_deploy`, which flattens the exe and any
# runtime shared libs into one folder). In the default static build that is a
# single self-contained executable; the shared variant (-pr:a=shared) adds the
# runtime libraries beside it. The folder is archived per platform
# (gateway-linux.tar.gz / gateway-windows.zip) and uploaded as a workflow
# artifact; cd.gateway.yml's upload job consumes those artifacts to create the
# GitHub Release. End-to-end coverage of the gateway against gateway-client-ts
# lives in the gateway-end-to-end integration-test workflow.

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            core
            pubsub
            fastdds-pubsub-provider
            .github
            .conan-profiles

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - name: Install Conan
        uses: ./.github/actions/conan-install

      # Gateway's conanfile requires fletcher-core, fletcher-pubsub and
      # fletcher-fastdds-pubsub-provider via version ranges. None is on any Conan
      # remote, so they must be in the local cache before `conan install` can
      # resolve them. fastdds-pubsub-provider itself depends on core + pubsub,
      # so those are created first.
      - name: Build fletcher-core, fletcher-pubsub, fletcher-fastdds-pubsub-provider (dependencies)
        shell: bash
        working-directory: gateway
        run: |
          conan create ../core --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release
          conan create ../pubsub --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release
          conan create ../fastdds-pubsub-provider --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release

      # `conan create` exports the recipe and dispatches cmake configure /
      # build / test via the conanfile's build() method, then packages the exe.
      # Letting Conan drive the build picks the right preset for the generator
      # in use — calling cmake --preset conan-release directly breaks on Windows
      # (the multi-config VS generator only creates the conan-default configure
      # preset, with conan-release reserved for the build step), whereas Linux
      # single-config generators are the opposite. run_tests=True builds and
      # runs the unit tests as part of the build.
      - name: Build, test, and package the gateway
        shell: bash
        working-directory: gateway
        run: |
          conan create . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      # Self-contained bundle: gateway.exe + the runtime DLLs beside it (the
      # Windows loader searches the exe's own directory first), so it runs with
      # no PATH / conanrun setup. The gateway is an `application` Conan package,
      # so runtime_deploy flattens the exe AND every runtime DLL it links into
      # dist/ — entirely with Conan, no cmake --install. The bundle is zipped.
      - name: Bundle gateway + runtime libraries
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: gateway
        run: |
          conan install --requires="fletcher-gateway/[*, include_prerelease]" --deployer=runtime_deploy --deployer-folder=dist -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release
          rm -f dist/conaninfo.txt dist/conanmanifest.txt   # Conan deploy metadata, not release content
          ( cd dist && 7z a -tzip "${GITHUB_WORKSPACE}/gateway-windows.zip" . >/dev/null )

      - name: Upload Windows bundle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gateway-windows
          path: gateway-windows.zip
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            core
            pubsub
            fastdds-pubsub-provider
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build dependencies, install, build, and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'gateway-linux.tar.gz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/gateway \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              # fletcher-core/pubsub/fastdds-pubsub-provider must be in the local
              # cache before gateway can resolve them (no Conan remote hosts the
              # fletcher-* packages). fastdds-pubsub-provider depends on core +
              # pubsub, so those come first.
              conan create ../core --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              conan create ../pubsub --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              conan create ../fastdds-pubsub-provider --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              # conan create exports + builds + tests (run_tests=True) + packages
              # the gateway application (package() installs the exe with its
              # $ORIGIN rpath).
              conan create . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              # Self-contained bundle: because the gateway is an `application`
              # package, runtime_deploy flattens the exe (with its $ORIGIN rpath)
              # AND every runtime shared library it links into dist/, so the
              # released artifact runs with no LD_LIBRARY_PATH / conanrun — all
              # with Conan, no cmake --install. Tarred inside docker so the
              # archive is readable by the runner user.
              if [[ -n "$ARTIFACT_NAME" ]]; then
                PROFILE=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
                conan install --requires="fletcher-gateway/[*, include_prerelease]" --deployer=runtime_deploy --deployer-folder=dist -pr:a="$PROFILE"
                rm -f dist/conaninfo.txt dist/conanmanifest.txt   # Conan deploy metadata, not release content
                tar -czf "/workspace/$ARTIFACT_NAME" -C dist .
              fi
            '

      - name: Upload Linux binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gateway-linux
          path: gateway-linux.tar.gz
          retention-days: 5
