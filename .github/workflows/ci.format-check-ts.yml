name: ci.format-check-ts

concurrency:
  group: ci.format-check-ts-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/ci.format-check-ts.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pin Node to the same patch version the devcontainer installs so
      # any tooling that pulls Node-version-sensitive behaviour stays in
      # lock-step between editor and CI.
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
      # Pin prettier in lock-step with the devcontainer's globally-
      # installed version so devcontainer + CI agree on what
      # "formatted" means.
      - name: Run prettier --check
        run: npx --yes prettier@3.3.3 --check '**/*.{ts,tsx,js,mjs,cjs,json}' --ignore-path .prettierignore
