name: ci.integration-test.gateway-end-to-end

concurrency:
  group: ci.integration-test.gateway-end-to-end-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers. Only the
          Linux job needs it; the Windows job runs natively on the
          windows-2022 runner.
        required: true
        type: string

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            pubsub
            protoc
            fastdds-pubsub-provider
            gateway
            gateway-client-ts
            integration-tests/gateway-end-to-end
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build components and run integration tests
        run: |
          # The gateway now always links Fast DDS (shared libs under the
          # *:shared=True profile), so the spawned gateway exe needs the Conan
          # run environment (libfastdds/libfastcdr/...) on the loader path —
          # source conanrun.sh before npm test. A future self-contained gateway
          # deploy (libs next to the exe + $ORIGIN RPATH) will remove this need.
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            fletcher-build \
            bash -c "set -e && \
                     PROFILE=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release && \
                     for COMPONENT in core pubsub protoc fastdds-pubsub-provider; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/gateway-end-to-end && \
                     echo '::group::conan build integration test (configure + build gateway exe)' && \
                     conan build . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::npm ci' && \
                     npm ci && \
                     echo '::endgroup::' && \
                     echo '::group::npm test' && \
                     source build/Release/generators/conanrun.sh && \
                     npm test && \
                     echo '::endgroup::'"

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            pubsub
            protoc
            gateway
            gateway-client-ts
            integration-tests/gateway-end-to-end
            .conan-profiles
            .github

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build components into local Conan cache
        shell: bash
        run: |
          set -e
          PROFILE=.conan-profiles/Windows-msvc194-x86_64-Release
          for COMPONENT in core pubsub protoc; do
            echo "::group::conan create $COMPONENT"
            (cd "$COMPONENT" && conan create . --build=missing -pr:a="../$PROFILE")
            echo "::endgroup::"
          done

      - name: conan build integration test (configure + build gateway exe)
        shell: bash
        working-directory: integration-tests/gateway-end-to-end
        run: conan build . --build=missing -pr:a=../../.conan-profiles/Windows-msvc194-x86_64-Release

      - name: npm ci
        shell: bash
        working-directory: integration-tests/gateway-end-to-end
        run: npm ci

      - name: npm test
        shell: bash
        working-directory: integration-tests/gateway-end-to-end
        run: npm test
