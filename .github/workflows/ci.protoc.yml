name: ci.protoc

concurrency:
  group: ci.protoc-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers; the
          cd.protoc.yml wrapper does the same for tag-push releases.
        required: true
        type: string
    outputs:
      conan-ref:
        description: >-
          Conan package reference (name/version) computed on tag-push by
          build-windows. Empty on PR runs. Consumed by cd.protoc.yml's
          upload job to verify the tag matches conanfile version.
        value: ${{ jobs.build-windows.outputs.conan-ref }}

jobs:
  build-windows:
    runs-on: windows-2022
    outputs:
      conan-ref: ${{ steps.get-ref.outputs.conan-ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build and test
        shell: bash
        working-directory: protoc
        run: conan create . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      - name: Get Conan reference
        id: get-ref
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: protoc
        run: |
          ref=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['name'] + '/' + d['version'])")
          echo "conan-ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Save Conan package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: conan cache save "${{ steps.get-ref.outputs.conan-ref }}" --file "fletcher-protoc-windows-conan-package.tgz"

      - name: Upload Windows Conan package .tgz artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows
          path: fletcher-protoc-windows-conan-package.tgz
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'fletcher-protoc-linux-conan-package.tgz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/protoc \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              conan create . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              if [[ -n "$ARTIFACT_NAME" ]]; then
                REF=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[\"name\"]+\"/\"+d[\"version\"])")
                conan cache save "$REF" --file "/workspace/$ARTIFACT_NAME"
              fi
            '

      - name: Upload Linux Conan package .tgz artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux
          path: fletcher-protoc-linux-conan-package.tgz
          retention-days: 5

  # Static-link builds produce the single-file binaries that ship as raw
  # GitHub Release assets (consumed by the @eiva/protoc-gen-fletcher npm
  # shim and anyone downloading directly). The protoc recipe pins protobuf
  # static (default_options) and static is the profile default, so
  # fletcher-protoc[.exe] links protobuf + zlib in and has no runtime DLL
  # dependencies — same way Google ships protoc.exe.
  #
  # Gated on tag-push only (same pattern as the Conan tarball upload
  # above): the integration-test workflows build their own static
  # binary on PR runs, so we don't need to duplicate it here. cd.protoc.yml's
  # create-release job downloads these artifacts on tag-push.
  build-static-windows:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build static fletcher-protoc
        shell: bash
        run: conan create protoc --build=missing -pr:a=.conan-profiles/Windows-msvc194-x86_64-Release

      - name: Extract static binary
        shell: bash
        run: |
          set -euo pipefail
          bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc.exe" -type f -print -quit)
          if [ -z "$bin" ]; then
            echo "::error::fletcher-protoc.exe not found in Conan cache after static build"
            find ~/.conan2 -name "fletcher-protoc*" -type f
            exit 1
          fi
          cp "$bin" protoc-gen-fletcher-windows-x64.exe
          ls -lah protoc-gen-fletcher-windows-x64.exe

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows-static
          path: protoc-gen-fletcher-windows-x64.exe
          retention-days: 5

  build-static-linux:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build static fletcher-protoc and extract binary
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" -w /workspace \
            fletcher-build \
            bash -c '
              set -euo pipefail
              conan create protoc/. --build=missing \
                -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc" -type f -print -quit)
              if [ -z "$bin" ]; then
                echo "::error::fletcher-protoc binary not found in Conan cache after static build"
                find ~/.conan2 -name "fletcher-protoc*" -type f
                exit 1
              fi
              cp "$bin" /workspace/protoc-gen-fletcher-linux-x64
              chmod +x /workspace/protoc-gen-fletcher-linux-x64
              ls -lah /workspace/protoc-gen-fletcher-linux-x64
            '

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux-static
          path: protoc-gen-fletcher-linux-x64
          retention-days: 5
