name: ci.protoc

concurrency:
  group: ci.protoc-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers; the
          cd.protoc.yml wrapper does the same for tag-push releases.
        required: true
        type: string
    outputs:
      conan-ref:
        description: >-
          Conan package reference (name/version) computed on tag-push by
          build-windows. Empty on PR runs. Consumed by cd.protoc.yml's
          upload job to verify the tag matches conanfile version.
        value: ${{ jobs.build-windows.outputs.conan-ref }}

# On tag-push each platform's build job emits two release artifacts from a
# SINGLE build: the Conan package (.tgz, for Conan consumers) and the raw
# single-file binary (protoc-gen-fletcher-*, for GitHub Release / the
# @eiva/protoc-gen-fletcher npm shim and direct downloads). protoc links
# protobuf + zlib statically (the recipe pins protobuf static and static is the
# profile default), so the raw binary has no runtime DLL dependencies — same
# way Google ships protoc.exe. cd.protoc.yml's create-release job downloads
# both artifacts on tag-push.

jobs:
  # Fast pre-flight: verify that conanfile.py and package.json carry the same
  # version string. Runs on every PR so a mismatch is caught during code review,
  # not at release time when the tag-push CD pipeline fires.
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc/conanfile.py
            protoc/npm/package.json
          sparse-checkout-cone-mode: false

      - name: Verify conanfile.py and package.json versions match
        run: |
          set -euo pipefail
          conan_ver=$(python3 - <<'PYEOF'
          import re, pathlib
          text = pathlib.Path('protoc/conanfile.py').read_text()
          m = re.search(r'version\s*=\s*["\']([^"\']+)["\']', text)
          if not m:
              raise SystemExit('ERROR: version= not found in protoc/conanfile.py')
          print(m.group(1))
          PYEOF
          )
          npm_ver=$(python3 -c "import json; print(json.load(open('protoc/npm/package.json'))['version'])")
          if [ "$conan_ver" != "$npm_ver" ]; then
            echo "::error::Version mismatch — conanfile.py='$conan_ver' package.json='$npm_ver'. Update both files to the same version before merging."
            exit 1
          fi
          echo "Versions consistent: $conan_ver"

  build-windows:
    needs: check-versions
    runs-on: windows-2022
    outputs:
      conan-ref: ${{ steps.get-ref.outputs.conan-ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build and test
        shell: bash
        working-directory: protoc
        run: conan create . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      - name: Get Conan reference
        id: get-ref
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: protoc
        run: |
          ref=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['name'] + '/' + d['version'])")
          echo "conan-ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Save Conan package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: conan cache save "${{ steps.get-ref.outputs.conan-ref }}" --file "fletcher-protoc-windows-conan-package.tgz"

      - name: Upload Windows Conan package .tgz artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows
          path: fletcher-protoc-windows-conan-package.tgz
          retention-days: 5

      # Raw single-file binary for GitHub Release / the npm shim — extracted
      # from the build above, not rebuilt.
      - name: Extract static binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc.exe" -type f -print -quit)
          if [ -z "$bin" ]; then
            echo "::error::fletcher-protoc.exe not found in Conan cache"
            find ~/.conan2 -name "fletcher-protoc*" -type f
            exit 1
          fi
          cp "$bin" protoc-gen-fletcher-windows-x64.exe
          ls -lah protoc-gen-fletcher-windows-x64.exe

      - name: Upload Windows static binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows-static
          path: protoc-gen-fletcher-windows-x64.exe
          retention-days: 5

  build-linux:
    needs: check-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'fletcher-protoc-linux-conan-package.tgz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/protoc \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              conan create . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              if [[ -n "$ARTIFACT_NAME" ]]; then
                REF=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[\"name\"]+\"/\"+d[\"version\"])")
                conan cache save "$REF" --file "/workspace/$ARTIFACT_NAME"
                # Raw single-file binary for GitHub Release / the npm shim,
                # extracted from the same build rather than rebuilt.
                bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc" -type f -print -quit)
                if [ -z "$bin" ]; then
                  echo "::error::fletcher-protoc binary not found in Conan cache"
                  find ~/.conan2 -name "fletcher-protoc*" -type f
                  exit 1
                fi
                cp "$bin" /workspace/protoc-gen-fletcher-linux-x64
                chmod +x /workspace/protoc-gen-fletcher-linux-x64
              fi
            '

      - name: Upload Linux Conan package .tgz artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux
          path: fletcher-protoc-linux-conan-package.tgz
          retention-days: 5

      - name: Upload Linux static binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux-static
          path: protoc-gen-fletcher-linux-x64
          retention-days: 5
