name: typescript

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "codec-ts/**"
      - "gateway-client-ts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/typescript.yml"

jobs:
  build-and-test:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            codec-ts
            gateway-client-ts
            package.json
            package-lock.json
            .github/workflows

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      # codec-ts must build first because gateway-client-ts's tsc
      # resolves `eiva-fletcher-codec` types from codec-ts/dist/.
      - name: Build codec-ts
        run: npm run build --workspace eiva-fletcher-codec

      - name: Typecheck gateway-client-ts
        run: npm run build:ts --workspace eiva-fletcher-gateway-client

      - name: Test all workspaces
        run: npm test --workspaces --if-present
