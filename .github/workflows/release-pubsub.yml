#
# Release orchestration for fletcher-pubsub. Owns the setup-devcontainer
# step, invokes fletcher-pubsub.yml with the resulting image to build and
# upload artifacts, and creates the GitHub Release. fletcher-pubsub.yml is
# also called from pr.yml — build/test logic is shared so PR and release
# runs use the same source of truth. The upload job lives here so PR
# runs do not show a skipped upload rectangle.
#
# Triggers:
#   * push: tags 'pubsub-v*'     — real release.

name: release-pubsub

on:
  push:
    tags:
      - 'pubsub-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/fletcher-pubsub.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pubsub
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version
        with:
          conan-ref: ${{ needs.release.outputs.conan-ref }}
          tag-prefix: pubsub-v

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-pubsub-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-pubsub-windows.tgz" \
            "fletcher-pubsub-linux.tgz"
