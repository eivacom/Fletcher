name: ci.integration-test.fastdds-xrce-interop

concurrency:
  group: ci.integration-test.fastdds-xrce-interop-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers. Only the
          Linux job needs it; the Windows job runs natively on the
          windows-2022 runner.
        required: true
        type: string

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            arrow-bridge
            pubsub
            pubsub-arrow
            fastdds-pubsub-provider
            xrcedds-pubsub-provider
            integration-tests/fastdds-xrce-interop
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build components and run integration tests
        run: |
          docker run --rm --network host -v ${{ github.workspace }}:/workspace -w /workspace \
            fletcher-build \
            bash -c "set -e && \
                     PROFILE=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release && \
                     for COMPONENT in core arrow-bridge pubsub pubsub-arrow fastdds-pubsub-provider xrcedds-pubsub-provider; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/fastdds-xrce-interop && \
                     echo '::group::conan build integration test (configure + build incl. MicroXRCEAgent + ctest)' && \
                     conan build . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::'"

  windows:
    runs-on: windows-2022
    env:
      # Short Conan home so deep dependency build paths (notably boost's
      # source tree) stay under Windows' 260-char MAX_PATH, and so the
      # Cache Conan path below is deterministic regardless of runner user.
      CONAN_HOME: C:\cn2
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            arrow-bridge
            pubsub
            pubsub-arrow
            fastdds-pubsub-provider
            xrcedds-pubsub-provider
            integration-tests/fastdds-xrce-interop
            .conan-profiles
            .github

      - name: Install Conan
        uses: ./.github/actions/conan-install

      # Cache the third-party Conan binaries. boost/1.90.0 and fast-dds
      # have no prebuilt binaries on conancenter, so `--build=missing`
      # compiles them from source (~14 min combined). The fletcher-*
      # packages are re-created every run regardless, so a warm-but-stale
      # restore via the prefix key is harmless; the exact key only governs
      # when a fresh cache is written. Trimmed before save (see last step).
      - name: Cache Conan home
        uses: actions/cache@v5.0.5
        with:
          path: C:\cn2
          key: conan-win-fastdds-xrce-${{ hashFiles('.conan-profiles/Windows-msvc194-x86_64-Release', 'arrow-bridge/conanfile.py', 'fastdds-pubsub-provider/conanfile.py') }}
          restore-keys: |
            conan-win-fastdds-xrce-
            conan-win-

      # Cache the MicroXRCEAgent superbuild. The integration test's
      # CMakeLists builds eProsima's Agent (and its own fast-dds/asio/...)
      # from source as an ExternalProject (~10-15 min). It lives outside
      # the Conan home (C:\fl-uxa-install), so it needs its own cache.
      # Keyed on the CMakeLists (which pins the agent's GIT_TAG) + profile
      # so a tag bump invalidates it. No prefix fallback: a stale restore
      # would make the CMake guard skip rebuilding the wrong version.
      - name: Cache MicroXRCEAgent build
        uses: actions/cache@v5.0.5
        with:
          path: C:\fl-uxa-install
          key: microxrce-agent-win-${{ hashFiles('integration-tests/fastdds-xrce-interop/CMakeLists.txt', '.conan-profiles/Windows-msvc194-x86_64-Release') }}

      - name: Build components into local Conan cache
        shell: bash
        run: |
          set -e
          PROFILE=.conan-profiles/Windows-msvc194-x86_64-Release
          for COMPONENT in core arrow-bridge pubsub pubsub-arrow fastdds-pubsub-provider xrcedds-pubsub-provider; do
            echo "::group::conan create $COMPONENT"
            (cd "$COMPONENT" && conan create . --build=missing -pr:a="../$PROFILE")
            echo "::endgroup::"
          done

      - name: conan build integration test (configure + build incl. MicroXRCEAgent + ctest)
        shell: bash
        working-directory: integration-tests/fastdds-xrce-interop
        run: conan build . --build=missing -pr:a=../../.conan-profiles/Windows-msvc194-x86_64-Release

      # Strip Conan sources + build folders (keeps the package binaries)
      # before the actions/cache post-step so the saved home stays small.
      - name: Trim Conan cache before save
        if: always()
        shell: bash
        run: conan cache clean "*" || true
