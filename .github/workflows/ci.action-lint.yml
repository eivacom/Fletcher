name: Lint GitHub Actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths:
      - ".github/**"
      - "!**/*.md"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github folder
        uses: actions/checkout@v6

      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.12
        with:
          # `concurrency.queue` was added to GitHub Actions in April 2026 but
          # actionlint 1.7.12 still rejects it as unknown. The key is valid;
          # we ignore the specific complaint until actionlint catches up.
          args: -color -ignore "unexpected key .queue. for .concurrency."
