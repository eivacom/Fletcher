name: fletcher-arrow-bridge

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "arrow-bridge/**"
      - ".github/workflows/fletcher-arrow-bridge.yml"
      - ".github/actions/install-msvc-tools/**"
  # TODO: temporary — verify the workflow runs end-to-end on push. Remove before merging.
  push:
    branches:
      - feature/arrow-bridge-migration

jobs:
  build-windows:
    runs-on:
      group: windows-server-core-ltsc2025
    outputs:
      conan-ref: ${{ steps.conan-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - name: Setup Conan
        uses: eivacom/conan-actions/conan-setup@v1.0
        with:
          python-version: "3.14.4"
          conan-version: "2.27.1"

      - name: Configure Conan
        uses: eivacom/conan-actions/conan-configure@v1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config_urls: |
            https://github.com/eivacom/conan-configuration

      - name: Login Conan
        uses: eivacom/conan-actions/conan-login@v1.0
        with:
          remote: conan-eiva
          username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}

      - name: Get package reference
        id: conan-ref
        shell: pwsh
        working-directory: arrow-bridge
        run: |
          $inspect = conan inspect . --format=json | ConvertFrom-Json
          echo "ref=$($inspect.name)/$($inspect.version)" >> $env:GITHUB_OUTPUT

      - name: Build and test
        working-directory: arrow-bridge
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

      - name: Export package from Conan cache
        working-directory: arrow-bridge
        run: conan cache save "${{ steps.conan-ref.outputs.ref }}" --file conan-pkg-windows.tgz

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-pkg-windows
          path: arrow-bridge/conan-pkg-windows.tgz
          retention-days: 1

  build-linux:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6

      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Log in to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login dockerrepo.eiva.com -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin

      - name: Build devcontainer image
        run: |
          docker buildx create --name builder --use
          docker buildx build \
            --network host \
            --cache-from type=registry,ref=dockerrepo.eiva.com/fletcher/arrow-bridge-devcontainer:cache \
            --cache-to type=registry,ref=dockerrepo.eiva.com/fletcher/arrow-bridge-devcontainer:cache,mode=max \
            -t fletcher-arrow-bridge-build \
            --load \
            arrow-bridge/.devcontainer

      - name: Build, test and export package
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/arrow-bridge \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-arrow-bridge-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True' && \
                     ref=\$(conan inspect . --format=json | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d[\"name\"]+\"/\"+d[\"version\"])') && \
                     conan cache save \"\$ref\" --file conan-pkg-linux.tgz"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conan-pkg-linux
          path: arrow-bridge/conan-pkg-linux.tgz
          retention-days: 1

  # ── Upload — runs only after both platforms pass ──────────────────────────
  upload:
    needs: [ build-windows, build-linux ]
    runs-on:
      group: ubuntu_24.04_x64
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Setup Conan
        uses: eivacom/conan-actions/conan-setup@v1.0
        with:
          python-version: "3.14.4"
          conan-version: "2.27.1"

      - name: Configure Conan
        uses: eivacom/conan-actions/conan-configure@v1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config_urls: |
            https://github.com/eivacom/conan-configuration

      - name: Login Conan
        uses: eivacom/conan-actions/conan-login@v1.0
        with:
          remote: conan-eiva
          username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}

      - name: Download Windows package artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-pkg-windows

      - name: Download Linux package artifact
        uses: actions/download-artifact@v4
        with:
          name: conan-pkg-linux

      - name: Restore Windows package into Conan cache
        run: conan cache restore conan-pkg-windows.tgz

      - name: Restore Linux package into Conan cache
        run: conan cache restore conan-pkg-linux.tgz

      # TODO: temporarily disabled while the feature/arrow-bridge-migration push
      # trigger is active. Re-enable (drop the `if: false`) before merging.
      - name: Upload to Artifactory
        if: false
        uses: eivacom/conan-actions/conan-upload@v1.0
        with:
          remote: conan-eiva
          package: '"${{ needs.build-windows.outputs.conan-ref }}"'
          args: --confirm
