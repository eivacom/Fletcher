name: ci.gateway-client

concurrency:
  group: ci.gateway-client-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers; the
          cd.gateway-client.yml wrapper does the same for tag-push releases.
        required: true
        type: string

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway-client-ts
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      # The devcontainer ships the same pinned Node + npm as the image CI
      # builds for the C++ components, so a clean install/build/test here
      # matches exactly what a developer gets locally via "Reopen in
      # Container". dist/ is written into the volume-mounted workspace, so
      # it is visible on the host for the upload step below.
      - name: Build and test
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/gateway-client-ts \
            fletcher-build \
            bash -c '
              set -e
              npm ci
              npm run build
              npm test
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gateway-client-ts
          path: gateway-client-ts/dist
          retention-days: 5
