# Copyright (C) 2026 The Fletcher Authors
#
name: license-headers

concurrency:
  group: license-headers-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

# Block-merge guard. Every tracked file must carry
#
#   SPDX-License-Identifier: LGPL-3.0-or-later
#   Copyright (C) <year> The Fletcher Authors
#
# within its first ten lines, with the right comment prefix for the
# file's language (// for C / C++ / TypeScript / Protobuf, # for
# Python / CMake / YAML / Dockerfile).
#
# The check scans the entire tree on every PR, not just the diff, so a
# regression in main can never linger unnoticed. It is fast because
# the per-file work is one `head -n 10 | grep`.
#
# Exclusions follow a strict denylist — everything tracked is checked
# unless it matches one of:
#
#   * Vendored code we don't own (pubsub/third_party/).
#   * License / author docs (LICENSE, AUTHORS) — they ARE the headers.
#   * .md (project docs) and .gitignore/.gitattributes (small config
#     files) — we deliberately don't put headers on these.
#   * .conan-profiles/ — Conan INI-style profile files; no comment syntax
#     recognised by the Conan profile parser.
#   * Strict-JSON files that no parser tolerates comments in:
#     package.json (npm parses it strictly), package-lock.json
#     (regenerated by npm — any header we write disappears on the next
#     install), and .prettierrc (prettier's JSON parser is strict —
#     comments break config load). JSONC files like tsconfig.json and
#     devcontainer.json ARE checked — TypeScript and VS Code accept
#     // comments there.
#
# Build / generated paths (build/, dist/, node_modules/, out/) are not
# listed: they are gitignored, so `git ls-files` never sees them. A
# committed build artifact will (correctly) fail the check.

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check SPDX + Copyright headers on all tracked files
        run: |
          set -euo pipefail

          # Every tracked file, minus the denylist.
          mapfile -t files < <(
            git ls-files \
              | grep -v -E '^pubsub/third_party/' \
              | grep -v -E '^(LICENSE|AUTHORS)$' \
              | grep -v -E '^\.gitignore$|^\.gitattributes$' \
              | grep -v -E '\.md$' \
              | grep -v -E '(^|/)package(-lock)?\.json$' \
              | grep -v -E '(^|/)\.prettierrc$' \
              | grep -v -E '^\.conan-profiles/' \
              || true
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Denylist matched everything tracked — nothing to check."
            exit 0
          fi

          echo "Checking ${#files[@]} file(s)."

          missing=()
          for f in "${files[@]}"; do
            [ -f "$f" ] || continue

            head -n 10 "$f" > /tmp/header.txt

            spdx_ok=0
            copy_ok=0
            grep -q 'SPDX-License-Identifier: LGPL-3.0-or-later' /tmp/header.txt && spdx_ok=1
            grep -Eq 'Copyright \(C\) [0-9]{4} The Fletcher Authors' /tmp/header.txt && copy_ok=1

            if [ "$spdx_ok" -eq 0 ] || [ "$copy_ok" -eq 0 ]; then
              reason=""
              [ "$spdx_ok" -eq 0 ] && reason="$reason missing 'SPDX-License-Identifier: LGPL-3.0-or-later';"
              [ "$copy_ok" -eq 0 ] && reason="$reason missing 'Copyright (C) <year> The Fletcher Authors';"
              missing+=("$f -$reason")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::License headers missing on ${#missing[@]} file(s):"
            for line in "${missing[@]}"; do
              echo "::error::  $line"
            done
            echo
            echo "Add to the top of each affected file (substitute the right comment prefix"
            echo "for the file's language — // for C/C++/TypeScript/Protobuf, # for Python/"
            echo "CMake/YAML/Dockerfile):"
            echo
            echo "  // SPDX-License-Identifier: LGPL-3.0-or-later"
            echo "  // Copyright (C) $(date +%Y) The Fletcher Authors"
            echo "  //"
            echo
            echo "If the file type genuinely cannot carry a header (binary / JSON / no"
            echo "comment syntax), add it to the denylist in"
            echo ".github/workflows/license-headers.yml."
            exit 1
          fi

          echo "All ${#files[@]} tracked file(s) carry the required headers."
