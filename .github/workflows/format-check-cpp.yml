name: format-check-cpp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.cpp"
      - "**/*.hpp"
      - "**/*.h"
      - "**/*.cc"
      - ".clang-format"
      - ".github/workflows/format-check-cpp.yml"

jobs:
  check:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6

      # Self-hosted runner ships without `sudo`; runs as root already, so
      # the apt-get calls work without elevation. `-y` to skip the prompt.
      # Pin to clang-format-18 (the version Ubuntu 24.04 currently provides
      # and the devcontainer installs) so CI and editor agree on what
      # "formatted" means; future Ubuntu LTS bumps will not silently change
      # the formatter behaviour underneath us.
      - name: Install clang-format-18
        run: |
          apt-get update
          apt-get install -y clang-format-18
          clang-format-18 --version

      # Build the file list at runtime so the workflow stays in sync with
      # `.prettierignore`-style exclusions without manual maintenance. We
      # skip vendored third-party code (pubsub/third_party/), generated
      # protoc output (*.fletcher.pb.h / *.fletcher.arrow.pb.h), and any
      # /build/ directories that may exist locally.
      - name: Run clang-format --dry-run --Werror
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc' \
            | grep -v -E '^pubsub/third_party/' \
            | grep -v -E '\.fletcher\.(arrow\.)?pb\.h$' \
            | grep -v -E '/build/' \
            | grep -v -E '^integration-tests/.*/generated-ts/')
          if [ -z "$files" ]; then
            echo "No first-party C++ files to check."
            exit 0
          fi
          echo "Checking $(echo "$files" | wc -l) files..."
          echo "$files" | xargs clang-format-18 --dry-run --Werror

  # ── PR Gate ───────────────────────────────────────────────────────────────
  pr_gate:
    needs: [ check ]
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pr-gate
        with:
          results: "${{ needs.check.result }}"
