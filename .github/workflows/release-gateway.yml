#
# Release orchestration for fletcher-gateway. Owns the setup-devcontainer
# step, invokes fletcher-gateway.yml with the resulting image to build and
# upload per-platform gateway binaries, and creates the GitHub Release.
# fletcher-gateway.yml is also called from pr.yml — build/test logic is
# shared so PR and release runs use the same source of truth.
#
# Gateway has no conanfile version to verify against the tag: the tag IS
# the version. Releasers are responsible for picking the right tag.
#
# Triggers:
#   * push: tags 'gateway-v*'     — real release.

name: release-gateway

on:
  push:
    tags:
      - 'gateway-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/fletcher-gateway.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: gateway-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "gateway.exe" \
            "gateway-linux.tar.gz"
