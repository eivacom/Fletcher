name: Fletcher PR build

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  # ── Stage 1: detect changed paths & spin up devcontainer image ───────────────

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      arrow-bridge: ${{ steps.filter.outputs.arrow-bridge }}
      fastdds-pubsub-provider: ${{ steps.filter.outputs.fastdds-pubsub-provider }}
      gateway: ${{ steps.filter.outputs.gateway }}
      gateway-client: ${{ steps.filter.outputs.gateway-client }}
      protoc: ${{ steps.filter.outputs.protoc }}
      pubsub: ${{ steps.filter.outputs.pubsub }}
      pubsub-arrow: ${{ steps.filter.outputs.pubsub-arrow }}
      xrcedds-pubsub-provider: ${{ steps.filter.outputs.xrcedds-pubsub-provider }}
      format-cpp: ${{ steps.filter.outputs.format-cpp }}
      format-ts: ${{ steps.filter.outputs.format-ts }}
      integration-fastdds-xrce: ${{ steps.filter.outputs.integration-fastdds-xrce }}
      integration-gateway-e2e: ${{ steps.filter.outputs.integration-gateway-e2e }}
      integration-protoc-arrow: ${{ steps.filter.outputs.integration-protoc-arrow }}
      integration-protoc-gateway-ts: ${{ steps.filter.outputs.integration-protoc-gateway-ts }}
      integration-pubsub-arrow-fastdds: ${{ steps.filter.outputs.integration-pubsub-arrow-fastdds }}
    steps:
      - uses: actions/checkout@v6
      # Filters list only positive patterns; we deliberately avoid '!'
      # negations. Reason: dorny/paths-filter v4 (with the default
      # predicate-quantifier: 'some') evaluates every pattern — including
      # negations — as an independent positive rule, returning `true` for
      # files that do NOT match the negated glob. A line like '!**/*.md'
      # therefore matches every non-.md file and causes the filter to
      # short-circuit to true regardless of the other patterns. As a
      # result, an unrelated change (e.g. only `.github/ISSUE_TEMPLATE/
      # config.yml`) would trigger every component build. Trade-off: a
      # docs-only README edit inside a component dir will now trigger
      # that component's build once — cheap and predictable, vs. the
      # broken negation that fired every build on every PR.
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            core:
              - 'core/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            arrow-bridge:
              - 'arrow-bridge/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            fastdds-pubsub-provider:
              - 'fastdds-pubsub-provider/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            gateway:
              - 'gateway/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            gateway-client:
              - 'gateway-client-ts/**'
              - '.github/workflows/pr.yml'
            protoc:
              - 'protoc/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            pubsub:
              - 'pubsub/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            pubsub-arrow:
              - 'pubsub-arrow/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            xrcedds-pubsub-provider:
              - 'xrcedds-pubsub-provider/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/conan-build-windows/**'
              - '.github/actions/conan-build-linux/**'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            format-cpp:
              - '**/*.cpp'
              - '**/*.hpp'
              - '**/*.h'
              - '**/*.cc'
              - '.clang-format'
              - '.github/workflows/pr.yml'
            format-ts:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/*.json'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/pr.yml'
            integration-fastdds-xrce:
              - 'core/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'pubsub-arrow/**'
              - 'fastdds-pubsub-provider/**'
              - 'xrcedds-pubsub-provider/**'
              - 'integration-tests/fastdds-xrce-interop/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            integration-gateway-e2e:
              - 'core/**'
              - 'pubsub/**'
              - 'protoc/**'
              - 'gateway/**'
              - 'gateway-client-ts/**'
              - 'integration-tests/gateway-end-to-end/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            integration-protoc-arrow:
              - 'core/**'
              - 'protoc/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'integration-tests/protoc-arrow-bridge/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            integration-protoc-gateway-ts:
              - 'core/**'
              - 'protoc/**'
              - 'pubsub/**'
              - 'gateway-client-ts/**'
              - 'integration-tests/protoc-gateway-client-ts/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
            integration-pubsub-arrow-fastdds:
              - 'core/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'pubsub-arrow/**'
              - 'fastdds-pubsub-provider/**'
              - 'integration-tests/pubsub-arrow-fastdds/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'

  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  # ── Stage 2: component builds ────────────────────────────────────────────────

  build-matrix-prep:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prep.outputs.matrix }}
    steps:
      - id: prep
        env:
          CHANGED_CORE:         ${{ needs.detect-changes.outputs.core }}
          CHANGED_ARROW:        ${{ needs.detect-changes.outputs.arrow-bridge }}
          CHANGED_PUBSUB:       ${{ needs.detect-changes.outputs.pubsub }}
          CHANGED_PUBSUB_ARROW: ${{ needs.detect-changes.outputs.pubsub-arrow }}
          CHANGED_PROTOC:       ${{ needs.detect-changes.outputs.protoc }}
          CHANGED_GATEWAY:      ${{ needs.detect-changes.outputs.gateway }}
          CHANGED_FASTDDS:      ${{ needs.detect-changes.outputs.fastdds-pubsub-provider }}
          CHANGED_XRCEDDS:      ${{ needs.detect-changes.outputs.xrcedds-pubsub-provider }}
        run: |
          entries=()
          [[ "$CHANGED_CORE"         == "true" ]] && entries+=('{"name":"core","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          [[ "$CHANGED_ARROW"        == "true" ]] && entries+=('{"name":"arrow-bridge","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          [[ "$CHANGED_PUBSUB"       == "true" ]] && entries+=('{"name":"pubsub","win-profile":"Visual-Studio-2022-v143-x64-RelWithDebInfo","build-mode":"create"}')
          [[ "$CHANGED_PUBSUB_ARROW" == "true" ]] && entries+=('{"name":"pubsub-arrow","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          [[ "$CHANGED_PROTOC"       == "true" ]] && entries+=('{"name":"protoc","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          [[ "$CHANGED_GATEWAY"      == "true" ]] && entries+=('{"name":"gateway","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"install-build"}')
          [[ "$CHANGED_FASTDDS"      == "true" ]] && entries+=('{"name":"fastdds-pubsub-provider","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          [[ "$CHANGED_XRCEDDS"      == "true" ]] && entries+=('{"name":"xrcedds-pubsub-provider","win-profile":"Visual-Studio-2022-v143-x64-Release","build-mode":"create"}')
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf ',%s' "${entries[@]}")
            echo "matrix=[${matrix:1}]" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: [build-matrix-prep]
    if: needs.build-matrix-prep.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.build-matrix-prep.outputs.matrix) }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ matrix.component.name }}
            .github
      - uses: ./.github/actions/conan-build-windows
        with:
          component: ${{ matrix.component.name }}
          conan-profile: ${{ matrix.component.win-profile }}
          build-mode: ${{ matrix.component.build-mode }}
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}

  build-linux:
    needs: [build-matrix-prep, setup-devcontainer]
    if: needs.build-matrix-prep.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.build-matrix-prep.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ matrix.component.name }}
            .github
      - uses: ./.github/actions/conan-build-linux
        with:
          component: ${{ matrix.component.name }}
          build-mode: ${{ matrix.component.build-mode }}
          devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  build-gateway-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway-client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-client-ts
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway-client-ts
            .github/workflows
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: gateway-client-ts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  format-check-cpp:
    needs: detect-changes
    if: needs.detect-changes.outputs.format-cpp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format-18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          clang-format-18 --version
      - name: Run clang-format --dry-run --Werror
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc' \
            | grep -v -E '^pubsub/third_party/' \
            | grep -v -E '\.fletcher\.(arrow\.)?pb\.h$' \
            | grep -v -E '/build/' \
            | grep -v -E '^integration-tests/.*/generated-ts/')
          if [ -z "$files" ]; then
            echo "No first-party C++ files to check."
            exit 0
          fi
          echo "Checking $(echo "$files" | wc -l) files..."
          echo "$files" | xargs clang-format-18 --dry-run --Werror

  format-check-ts:
    needs: detect-changes
    if: needs.detect-changes.outputs.format-ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
      - name: Run prettier --check
        run: npx --yes prettier@3.3.3 --check '**/*.{ts,tsx,js,mjs,cjs,json}' --ignore-path .prettierignore

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check SPDX + Copyright headers on all tracked files
        run: |
          set -euo pipefail

          # Every tracked file, minus the denylist.
          mapfile -t files < <(
            git ls-files \
              | grep -v -E '^pubsub/third_party/' \
              | grep -v -E '^(LICENSE|AUTHORS)$' \
              | grep -v -E '^\.gitignore$|^\.gitattributes$' \
              | grep -v -E '\.md$' \
              | grep -v -E '(^|/)package(-lock)?\.json$' \
              | grep -v -E '(^|/)\.prettierrc$' \
              || true
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Denylist matched everything tracked — nothing to check."
            exit 0
          fi

          echo "Checking ${#files[@]} file(s)."

          missing=()
          for f in "${files[@]}"; do
            [ -f "$f" ] || continue

            head -n 10 "$f" > /tmp/header.txt

            spdx_ok=0
            copy_ok=0
            grep -q 'SPDX-License-Identifier: LGPL-3.0-or-later' /tmp/header.txt && spdx_ok=1
            grep -Eq 'Copyright \(C\) [0-9]{4} The Fletcher Authors' /tmp/header.txt && copy_ok=1

            if [ "$spdx_ok" -eq 0 ] || [ "$copy_ok" -eq 0 ]; then
              reason=""
              [ "$spdx_ok" -eq 0 ] && reason="$reason missing 'SPDX-License-Identifier: LGPL-3.0-or-later';"
              [ "$copy_ok" -eq 0 ] && reason="$reason missing 'Copyright (C) <year> The Fletcher Authors';"
              missing+=("$f -$reason")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::License headers missing on ${#missing[@]} file(s):"
            for line in "${missing[@]}"; do
              echo "::error::  $line"
            done
            echo
            echo "Add to the top of each affected file (substitute the right comment prefix"
            echo "for the file's language — // for C/C++/TypeScript/Protobuf, # for Python/"
            echo "CMake/YAML/Dockerfile):"
            echo
            echo "  // SPDX-License-Identifier: LGPL-3.0-or-later"
            echo "  // Copyright (C) $(date +%Y) The Fletcher Authors"
            echo "  //"
            echo
            echo "If the file type genuinely cannot carry a header (binary / JSON / no"
            echo "comment syntax), add it to the denylist in"
            echo ".github/workflows/license-headers.yml."
            exit 1
          fi

          echo "All ${#files[@]} tracked file(s) carry the required headers."

  # ── Stage 2 (continued): integration tests ───────────────────────────────────

  integration-fastdds-xrce-interop:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.integration-fastdds-xrce == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            arrow-bridge
            pubsub
            pubsub-arrow
            fastdds-pubsub-provider
            xrcedds-pubsub-provider
            integration-tests/fastdds-xrce-interop
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build components and run integration tests
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64 -w0)
          docker run --rm --network host -v ${{ github.workspace }}:/workspace -w /workspace \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "set -e && \
                     git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     PROFILE=Ubuntu22-gcc-12-Release && \
                     for COMPONENT in core arrow-bridge pubsub pubsub-arrow fastdds-pubsub-provider xrcedds-pubsub-provider; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/fastdds-xrce-interop && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure' && \
                     cmake --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::cmake build (includes MicroXRCEAgent from source)' && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::ctest' && \
                     ctest --preset conan-release --output-on-failure && \
                     echo '::endgroup::'"

  integration-gateway-end-to-end:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.integration-gateway-e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            pubsub
            protoc
            gateway
            gateway-client-ts
            integration-tests/gateway-end-to-end
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build components and run integration tests
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "set -e && \
                     git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     PROFILE=Ubuntu22-gcc-12-Release && \
                     for COMPONENT in core pubsub protoc; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/gateway-end-to-end && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure + build' && \
                     cmake --preset conan-release && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::npm ci' && \
                     npm ci && \
                     echo '::endgroup::' && \
                     echo '::group::npm test' && \
                     npm test && \
                     echo '::endgroup::'"

  integration-protoc-arrow-bridge:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.integration-protoc-arrow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            protoc
            arrow-bridge
            pubsub
            integration-tests/protoc-arrow-bridge
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build components and run integration tests
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "set -e && \
                     git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     PROFILE=Ubuntu22-gcc-12-Release && \
                     for COMPONENT in core arrow-bridge pubsub protoc; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/protoc-arrow-bridge && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure' && \
                     cmake --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::cmake build' && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::ctest' && \
                     ctest --preset conan-release --output-on-failure && \
                     echo '::endgroup::'"

