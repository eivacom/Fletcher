            arrow-bridge
            pubsub
            pubsub-arrow
            fastdds-pubsub-provider
            integration-tests/pubsub-arrow-fastdds
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build components and run integration tests
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64 -w0)
          docker run --rm --network host -v ${{ github.workspace }}:/workspace -w /workspace \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "set -e && \
                     git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     PROFILE=Ubuntu22-gcc-12-Release && \
                     for COMPONENT in core arrow-bridge pubsub pubsub-arrow fastdds-pubsub-provider; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/pubsub-arrow-fastdds && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure' && \
                     cmake --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::cmake build' && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::ctest' && \
                     ctest --preset conan-release --output-on-failure && \
                     echo '::endgroup::'"

  # ── Stage 3: PR gate ────────────────────────────────────────────────────────
  pr_gate:
    needs:
      - setup-devcontainer
      - build-core-windows
      - build-core-linux
      - build-arrow-bridge-windows
      - build-arrow-bridge-linux
      - build-fastdds-pubsub-provider-windows
      - build-fastdds-pubsub-provider-linux
      - build-gateway-windows
      - build-gateway-linux
      - build-gateway-client
      - build-protoc-windows
      - build-protoc-linux
      - build-pubsub-windows
      - build-pubsub-linux
      - build-pubsub-arrow-windows
      - build-pubsub-arrow-linux
      - build-xrcedds-pubsub-provider-windows
      - build-xrcedds-pubsub-provider-linux
      - format-check-cpp
      - format-check-ts
      - license-check
      - integration-fastdds-xrce-interop
      - integration-gateway-end-to-end
      - integration-protoc-arrow-bridge
      - integration-protoc-gateway-client-ts
      - integration-pubsub-arrow-fastdds
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pr-gate
        with:
          results: >-
            ${{ needs.setup-devcontainer.result }},
            ${{ needs.build-core-windows.result }},
            ${{ needs.build-core-linux.result }},
            ${{ needs.build-arrow-bridge-windows.result }},
            ${{ needs.build-arrow-bridge-linux.result }},
            ${{ needs.build-fastdds-pubsub-provider-windows.result }},
            ${{ needs.build-fastdds-pubsub-provider-linux.result }},
            ${{ needs.build-gateway-windows.result }},
            ${{ needs.build-gateway-linux.result }},
            ${{ needs.build-gateway-client.result }},
            ${{ needs.build-protoc-windows.result }},
            ${{ needs.build-protoc-linux.result }},
            ${{ needs.build-pubsub-windows.result }},
            ${{ needs.build-pubsub-linux.result }},
            ${{ needs.build-pubsub-arrow-windows.result }},
            ${{ needs.build-pubsub-arrow-linux.result }},
            ${{ needs.build-xrcedds-pubsub-provider-windows.result }},
            ${{ needs.build-xrcedds-pubsub-provider-linux.result }},
            ${{ needs.format-check-cpp.result }},
            ${{ needs.format-check-ts.result }},
            ${{ needs.license-check.result }},
            ${{ needs.integration-fastdds-xrce-interop.result }},
            ${{ needs.integration-gateway-end-to-end.result }},
            ${{ needs.integration-protoc-arrow-bridge.result }},
            ${{ needs.integration-protoc-gateway-client-ts.result }},
            ${{ needs.integration-pubsub-arrow-fastdds.result }}
