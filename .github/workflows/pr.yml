name: pr

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Stage 1: detect changed paths & spin up devcontainer image ───────────────

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      arrow-bridge: ${{ steps.filter.outputs.arrow-bridge }}
      fastdds-pubsub-provider: ${{ steps.filter.outputs.fastdds-pubsub-provider }}
      gateway: ${{ steps.filter.outputs.gateway }}
      gateway-client: ${{ steps.filter.outputs.gateway-client }}
      protoc: ${{ steps.filter.outputs.protoc }}
      pubsub: ${{ steps.filter.outputs.pubsub }}
      pubsub-arrow: ${{ steps.filter.outputs.pubsub-arrow }}
      xrcedds-pubsub-provider: ${{ steps.filter.outputs.xrcedds-pubsub-provider }}
      format-cpp: ${{ steps.filter.outputs.format-cpp }}
      format-ts: ${{ steps.filter.outputs.format-ts }}
      integration-fastdds-xrce: ${{ steps.filter.outputs.integration-fastdds-xrce }}
      integration-gateway-e2e: ${{ steps.filter.outputs.integration-gateway-e2e }}
      integration-protoc-arrow: ${{ steps.filter.outputs.integration-protoc-arrow }}
      integration-protoc-gateway-ts: ${{ steps.filter.outputs.integration-protoc-gateway-ts }}
      integration-pubsub-arrow-fastdds: ${{ steps.filter.outputs.integration-pubsub-arrow-fastdds }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            arrow-bridge:
              - 'arrow-bridge/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            fastdds-pubsub-provider:
              - 'fastdds-pubsub-provider/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            gateway:
              - 'gateway/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            gateway-client:
              - 'gateway-client-ts/**'
              - '.github/workflows/pr.yml'
              - '!**/*.md'
            protoc:
              - 'protoc/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            pubsub:
              - 'pubsub/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            pubsub-arrow:
              - 'pubsub-arrow/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            xrcedds-pubsub-provider:
              - 'xrcedds-pubsub-provider/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/install-msvc-tools/**'
              - '.github/actions/install-cmake/**'
              - '.github/actions/conan-bootstrap/**'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            format-cpp:
              - '**/*.cpp'
              - '**/*.hpp'
              - '**/*.h'
              - '**/*.cc'
              - '.clang-format'
              - '.github/workflows/pr.yml'
            format-ts:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/*.json'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/pr.yml'
            integration-fastdds-xrce:
              - 'core/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'pubsub-arrow/**'
              - 'fastdds-pubsub-provider/**'
              - 'xrcedds-pubsub-provider/**'
              - 'integration-tests/fastdds-xrce-interop/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            integration-gateway-e2e:
              - 'core/**'
              - 'pubsub/**'
              - 'protoc/**'
              - 'gateway/**'
              - 'gateway-client-ts/**'
              - 'integration-tests/gateway-end-to-end/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            integration-protoc-arrow:
              - 'core/**'
              - 'protoc/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'integration-tests/protoc-arrow-bridge/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            integration-protoc-gateway-ts:
              - 'core/**'
              - 'protoc/**'
              - 'pubsub/**'
              - 'gateway-client-ts/**'
              - 'integration-tests/protoc-gateway-client-ts/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'
            integration-pubsub-arrow-fastdds:
              - 'core/**'
              - 'arrow-bridge/**'
              - 'pubsub/**'
              - 'pubsub-arrow/**'
              - 'fastdds-pubsub-provider/**'
              - 'integration-tests/pubsub-arrow-fastdds/**'
              - '.github/workflows/pr.yml'
              - '.github/actions/pull-devcontainer-image/**'
              - '.github/workflows/setup-devcontainer-image.yml'
              - '.devcontainer/**'
              - '!**/*.md'

  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  # ── Stage 2: component builds ────────────────────────────────────────────────

  build-core-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
      - name: Build and test
        working-directory: core
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

  build-core-linux:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.core == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/core \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True'"

  build-arrow-bridge-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.arrow-bridge == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            arrow-bridge
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
      - name: Build and test
        working-directory: arrow-bridge
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

  build-arrow-bridge-linux:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.arrow-bridge == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            arrow-bridge
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/arrow-bridge \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True'"

  build-fastdds-pubsub-provider-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.fastdds-pubsub-provider == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            fastdds-pubsub-provider
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
      - name: Build and test
        working-directory: fastdds-pubsub-provider
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

  build-fastdds-pubsub-provider-linux:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.fastdds-pubsub-provider == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            fastdds-pubsub-provider
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/fastdds-pubsub-provider \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True'"

  build-gateway-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
      - name: Build and test
        working-directory: gateway
        run: |
          conan install . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"
          conan build . -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

  build-gateway-linux:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/gateway \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan install . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True' && \
                     conan build . -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True'"

  build-gateway-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway-client == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    defaults:
      run:
        working-directory: gateway-client-ts
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway-client-ts
            .github/workflows
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: gateway-client-ts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  build-protoc-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.protoc == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}
      - name: Build and test
        working-directory: protoc
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

  build-protoc-linux:
    needs: [detect-changes, setup-devcontainer]
    if: needs.detect-changes.outputs.protoc == 'true'
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .devcontainer
            .github
      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration
      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/protoc \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True'"

  build-pubsub-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.pubsub == 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pubsub
            .github
      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools
      - name: Install CMake
        uses: ./.github/actions/install-cmake
      - name: Bootstrap Conan
