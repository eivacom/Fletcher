#
# Release orchestration for fletcher-protoc. Owns the setup-devcontainer
# step, invokes ci.protoc.yml with the resulting image to build the
# Conan-package artifacts (shared-linked, for Conan consumers), runs a
# parallel pair of build-static-* jobs to produce single-file raw
# binaries (statically-linked, for npm consumers + manual download
# scenarios), assembles the GitHub Release, and publishes to npm.
# ci.protoc.yml is also called from ci.pr.yml — build/test logic is
# shared so PR and release runs use the same source of truth for the
# Conan path. The upload + npm-publish jobs live here so PR runs do not
# show a skipped upload rectangle.
#
# Triggers:
#   * push: tags 'protoc-v*'     — real release.

name: cd.protoc

on:
  push:
    tags:
      - 'protoc-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/ci.setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/ci.protoc.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  # Static-link build for the raw GitHub Release assets (npm consumers
  # and anyone who downloads the binary directly). The `-o "*:shared=False"`
  # flag forces protobuf, zlib, and any other transitive dependency to be
  # statically linked into fletcher-protoc[.exe]. The result is a single
  # file with no DLL dependencies — Google's `protoc.exe` is shipped the
  # same way. This is what we extract and upload as `protoc-gen-fletcher-*`.
  #
  # The shared build (ci.protoc.yml above) is kept for the Conan tarball
  # release assets because Conan consumers want shared libs (so they can
  # share with other deps that link against protobuf).
  build-static-linux:
    needs: setup-devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build static fletcher-protoc and extract binary
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/workspace" -w /workspace \
            fletcher-build \
            bash -c '
              set -euo pipefail
              conan create protoc/. --build=missing \
                -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release \
                -o "*:shared=False"
              bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc" -type f -print -quit)
              if [ -z "$bin" ]; then
                echo "::error::fletcher-protoc binary not found in Conan cache after static build"
                find ~/.conan2 -name "fletcher-protoc*" -type f
                exit 1
              fi
              cp "$bin" /workspace/protoc-gen-fletcher-linux-x64
              chmod +x /workspace/protoc-gen-fletcher-linux-x64
              ls -lah /workspace/protoc-gen-fletcher-linux-x64
            '

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux-static
          path: protoc-gen-fletcher-linux-x64
          retention-days: 5

  build-static-windows:
    needs: setup-devcontainer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .conan-profiles
            .github

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build static fletcher-protoc
        shell: bash
        run: conan create protoc --build=missing -pr:a=.conan-profiles/Windows-msvc194-x86_64-Release -o "*:shared=False"

      - name: Extract static binary
        shell: bash
        run: |
          set -euo pipefail
          bin=$(find ~/.conan2/p -path "*/p/bin/fletcher-protoc.exe" -type f -print -quit)
          if [ -z "$bin" ]; then
            echo "::error::fletcher-protoc.exe not found in Conan cache after static build"
            find ~/.conan2 -name "fletcher-protoc*" -type f
            exit 1
          fi
          cp "$bin" protoc-gen-fletcher-windows-x64.exe
          ls -lah protoc-gen-fletcher-windows-x64.exe

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows-static
          path: protoc-gen-fletcher-windows-x64.exe
          retention-days: 5

  upload:
    needs: [release, build-static-linux, build-static-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version-conan
        with:
          conan-ref: ${{ needs.release.outputs.conan-ref }}
          tag-prefix: protoc-v

      - name: Verify tag version matches protoc/npm/package.json version
        uses: ./.github/actions/verify-tag-version-npm
        with:
          package-json: protoc/npm/package.json
          tag-prefix: protoc-v

      # Download all four upstream artifacts at once:
      #   - fletcher-protoc-linux + fletcher-protoc-windows
      #       → shared-linked Conan-package tarballs (from ci.protoc.yml)
      #   - fletcher-protoc-linux-static + fletcher-protoc-windows-static
      #       → static-linked raw binaries (from build-static-* jobs)
      # `merge-multiple: true` flattens each artifact's single file into
      # the current directory, matching the file names the gh release
      # create command below expects.
      - name: Download all release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-protoc-*
          merge-multiple: true

      - name: Verify all release assets are present
        shell: bash
        run: |
          set -euo pipefail
          for asset in \
            fletcher-protoc-linux-conan-package.tgz \
            fletcher-protoc-windows-conan-package.tgz \
            protoc-gen-fletcher-linux-x64 \
            protoc-gen-fletcher-windows-x64.exe; do
            if [ ! -f "$asset" ]; then
              echo "::error::Missing release asset: $asset"
              ls -lah
              exit 1
            fi
          done
          chmod +x protoc-gen-fletcher-linux-x64
          ls -lah fletcher-protoc-*-conan-package.tgz protoc-gen-fletcher-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-protoc-windows-conan-package.tgz" \
            "fletcher-protoc-linux-conan-package.tgz" \
            "protoc-gen-fletcher-linux-x64" \
            "protoc-gen-fletcher-windows-x64.exe"

  npm-publish:
    needs: upload
    runs-on: ubuntu-latest
    # id-token: write is required for `npm publish --provenance` to mint
    # an OIDC token that npm exchanges for a signed Sigstore attestation
    # linking the package back to this exact workflow run. Matches the
    # cd.gateway-client.yml pattern so both @eiva npm packages ship with
    # provenance.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc/npm

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve dist-tag
        id: dist-tag
        working-directory: protoc/npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRE=$(echo "$VERSION" | sed 's/^[0-9]*\.[0-9]*\.[0-9]*-//' | cut -d. -f1)
            echo "tag=$PRE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: protoc/npm
        run: npm publish --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
