#
# Release orchestration for fletcher-protoc. Owns the setup-devcontainer
# step, invokes ci.protoc.yml with the resulting image to build and
# upload artifacts, and creates the GitHub Release. ci.protoc.yml is
# also called from ci.pr.yml — build/test logic is shared so PR and release
# runs use the same source of truth. The upload job lives here so PR
# runs do not show a skipped upload rectangle.
#
# Triggers:
#   * push: tags 'protoc-v*'     — real release.

name: cd.protoc

on:
  push:
    tags:
      - 'protoc-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/ci.setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/ci.protoc.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version-conan
        with:
          conan-ref: ${{ needs.release.outputs.conan-ref }}
          tag-prefix: protoc-v

      - name: Verify tag version matches protoc/npm/package.json version
        uses: ./.github/actions/verify-tag-version-npm
        with:
          package-json: protoc/npm/package.json
          tag-prefix: protoc-v

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-protoc-*
          merge-multiple: true

      # Extract the raw plugin binary out of each Conan tarball so the npm
      # shim (@eiva/protoc-gen-fletcher) can download it directly without
      # having to unpack a Conan archive. Conan tarballs ship with the binary
      # at <package-folder>/bin/fletcher-protoc[.exe]; `find` locates it
      # regardless of the cache path's revision hash.
      - name: Extract raw plugin binaries
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)

          mkdir -p "$tmp/linux"
          tar -xzf fletcher-protoc-linux-conan-package.tgz -C "$tmp/linux"
          bin=$(find "$tmp/linux" -path '*/bin/fletcher-protoc' -type f | head -1)
          cp "$bin" protoc-gen-fletcher-linux-x64
          chmod +x protoc-gen-fletcher-linux-x64

          mkdir -p "$tmp/windows"
          tar -xzf fletcher-protoc-windows-conan-package.tgz -C "$tmp/windows"
          bin=$(find "$tmp/windows" -path '*/bin/fletcher-protoc.exe' -type f | head -1)
          cp "$bin" protoc-gen-fletcher-windows-x64.exe

          rm -rf "$tmp"
          ls -lah protoc-gen-fletcher-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-protoc-windows-conan-package.tgz" \
            "fletcher-protoc-linux-conan-package.tgz" \
            "protoc-gen-fletcher-linux-x64" \
            "protoc-gen-fletcher-windows-x64.exe"

  npm-publish:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc/npm

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve dist-tag
        id: dist-tag
        working-directory: protoc/npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRE=$(echo "$VERSION" | sed 's/^[0-9]*\.[0-9]*\.[0-9]*-//' | cut -d. -f1)
            echo "tag=$PRE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: protoc/npm
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
