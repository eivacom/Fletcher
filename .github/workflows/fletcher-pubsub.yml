name: fletcher-pubsub

concurrency:
  group: fletcher-pubsub-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          dockerrepo.eiva.com/fletcher/devcontainer:<sha>). The caller is
          responsible for invoking setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. pr.yml passes the
          image it built once and shares across all callers; the
          release-pubsub.yml wrapper does the same for tag-push releases.
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-2022
    outputs:
      conan-ref: ${{ steps.get-ref.outputs.conan-ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pubsub
            core
            .github
            .conan-profiles

      - name: Install Conan
        uses: ./.github/actions/conan-install

      # fletcher-core is not on any Conan remote, so its recipe must be in
      # the local cache before `conan create` on pubsub can resolve it.
      - name: Build fletcher-core (dependency)
        shell: bash
        working-directory: pubsub
        run: conan create ../core --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release

      - name: Build and test
        shell: bash
        working-directory: pubsub
        run: conan create . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      - name: Get Conan reference
        id: get-ref
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: pubsub
        run: |
          ref=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['name'] + '/' + d['version'])")
          echo "conan-ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Save Conan package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: conan cache save "${{ steps.get-ref.outputs.conan-ref }}" --file "fletcher-pubsub-windows.tgz"

      - name: Upload Windows artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-pubsub-windows
          path: fletcher-pubsub-windows.tgz
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pubsub
            core
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'fletcher-pubsub-linux.tgz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/pubsub \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              # fletcher-core must be in the local cache before pubsub can resolve it
              # (no Conan remote hosts the fletcher-* packages).
              conan create ../core --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              conan create . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              if [[ -n "$ARTIFACT_NAME" ]]; then
                REF=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[\"name\"]+\"/\"+d[\"version\"])")
                conan cache save "$REF" --file "/workspace/$ARTIFACT_NAME"
              fi
            '

      - name: Upload Linux artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-pubsub-linux
          path: fletcher-pubsub-linux.tgz
          retention-days: 5

  upload:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            pubsub
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}
          tag-prefix: pubsub-v

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-pubsub-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-pubsub-windows.tgz" \
            "fletcher-pubsub-linux.tgz"
