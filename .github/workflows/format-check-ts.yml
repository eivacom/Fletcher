name: format-check-ts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/format-check-ts.yml"

jobs:
  check:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      # Pin prettier in lock-step with the devcontainer's globally-
      # installed version so devcontainer + CI agree on what
      # "formatted" means.
      - name: Run prettier --check
        run: npx --yes prettier@3.3.3 --check '**/*.{ts,tsx,js,mjs,cjs,json}' --ignore-path .prettierignore
