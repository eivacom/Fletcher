name: build-devcontainer

# Pre-populates the Harbor BuildKit cache for the shared Fletcher devcontainer
# image (dockerrepo.eiva.com/fletcher/devcontainer:cache). Component workflows
# run `docker buildx build --cache-from=...:cache` which pulls only the layers
# they need — when .devcontainer/ is unchanged every layer is a cache hit, and
# when it has changed only the affected layers actually rebuild.
#
# This workflow runs on push to main (and via workflow_dispatch) so a single
# canonical build keeps the cache fresh; PR builds do not push to :cache.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainer.yml"
      - "!**/*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .devcontainer

      - name: Log in to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login dockerrepo.eiva.com -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin

      - name: Build and push cache
        run: |
          docker buildx create --name builder --use
          docker buildx build \
            --network host \
            --cache-from type=registry,ref=dockerrepo.eiva.com/fletcher/devcontainer:cache \
            --cache-to type=registry,ref=dockerrepo.eiva.com/fletcher/devcontainer:cache,mode=max \
            .devcontainer
