#
# Release orchestration for @eiva/fletcher-gateway-client. Invokes
# fletcher-gateway-client.yml to build and test, then publishes the
# package to npmjs.com.
#
# Triggers:
#   * push: tags 'gateway-client-v*'     — real release.

name: release-gateway-client

on:
  push:
    tags:
      - 'gateway-client-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build-and-test:
    uses: ./.github/workflows/fletcher-gateway-client.yml
    secrets: inherit

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway-client-ts
            .github/workflows

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: gateway-client-ts
          path: gateway-client-ts/dist

      - name: Resolve dist-tag
        id: dist-tag
        working-directory: gateway-client-ts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRE=$(echo "$VERSION" | sed 's/^[0-9]*\.[0-9]*\.[0-9]*-//' | cut -d. -f1)
            echo "tag=$PRE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: gateway-client-ts
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
