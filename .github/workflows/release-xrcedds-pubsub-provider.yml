#
# Release orchestration for fletcher-xrcedds-pubsub-provider. Owns the setup-devcontainer
# step + invokes fletcher-xrcedds-pubsub-provider.yml with the resulting image. The actual
# build/test/upload logic lives in fletcher-xrcedds-pubsub-provider.yml so PR runs (via
# pr.yml) and release tag-push runs share the same source of truth.
#
# Triggers:
#   * push: tags 'xrcedds-pubsub-provider-v*'     — real release; fletcher-xrcedds-pubsub-provider's upload
#                                 job runs (it gates on event_name == 'push').

name: release-xrcedds-pubsub-provider

on:
  push:
    tags:
      - 'xrcedds-pubsub-provider-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/fletcher-xrcedds-pubsub-provider.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    permissions:
      contents: write
    secrets: inherit
