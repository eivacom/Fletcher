#
# Release orchestration for fletcher-arrow-bridge. Owns the setup-devcontainer
# step, invokes fletcher-arrow-bridge.yml with the resulting image to build and
# upload artifacts, and creates the GitHub Release. fletcher-arrow-bridge.yml is
# also called from pr.yml — build/test logic is shared so PR and release
# runs use the same source of truth. The upload job lives here so PR
# runs do not show a skipped upload rectangle.
#
# Triggers:
#   * push: tags 'arrow-bridge-v*'     — real release.

name: release-arrow-bridge

on:
  push:
    tags:
      - 'arrow-bridge-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/fletcher-arrow-bridge.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            arrow-bridge
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version-conan
        with:
          conan-ref: ${{ needs.release.outputs.conan-ref }}
          tag-prefix: arrow-bridge-v

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-arrow-bridge-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-arrow-bridge-windows-conan-package.tgz" \
            "fletcher-arrow-bridge-linux-conan-package.tgz"
