name: ci.integration-test.gateway-fastdds-ts

concurrency:
  group: ci.integration-test.gateway-fastdds-ts-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          eivaorg/fletcher-devcontainer:<sha>). The caller is
          responsible for invoking ci.setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. ci.pr.yml passes the
          image it built once and shares across all callers.
        required: true
        type: string

jobs:
  gateway-fastdds-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            pubsub
            protoc
            fastdds-pubsub-provider
            gateway
            gateway-client-ts
            integration-tests/gateway-fastdds-ts
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      # --network host: the gateway (--provider fastdds) and the C++ FastDDS
      # peer are separate processes that discover each other over DDS, same as
      # the pubsub-arrow-fastdds suite. The gateway links Fast DDS as shared
      # libraries (the *:shared=True profile), so the spawned gateway + peer
      # need the Conan run environment on the loader path — hence sourcing
      # conanrun.sh before `npm test`.
      - name: Build components and run integration tests
        run: |
          docker run --rm --network host -v ${{ github.workspace }}:/workspace -w /workspace \
            fletcher-build \
            bash -c "set -e && \
                     PROFILE=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release && \
                     for COMPONENT in core pubsub protoc fastdds-pubsub-provider; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/gateway-fastdds-ts && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure + build' && \
                     cmake --preset conan-release && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::npm ci' && \
                     npm ci && \
                     echo '::endgroup::' && \
                     echo '::group::npm test' && \
                     source build/Release/generators/conanrun.sh && \
                     npm test && \
                     echo '::endgroup::'"
