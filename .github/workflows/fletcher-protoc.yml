name: fletcher-protoc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'protoc-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  build-windows:
    runs-on: windows-latest
    outputs:
      conan-ref: ${{ steps.get-ref.outputs.conan-ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - name: Install Conan
        uses: ./.github/actions/conan-install

      - name: Build and test
        shell: bash
        working-directory: protoc
        run: conan create . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      - name: Get Conan reference
        id: get-ref
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        working-directory: protoc
        run: |
          ref=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['name'] + '/' + d['version'])")
          echo "conan-ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Save Conan package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: conan cache save "${{ steps.get-ref.outputs.conan-ref }}" --file "fletcher-protoc-windows.tgz"

      - name: Upload Windows artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-windows
          path: fletcher-protoc-windows.tgz

  build-linux:
    needs: setup-devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'fletcher-protoc-linux.tgz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/protoc \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              conan create . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              if [[ -n "$ARTIFACT_NAME" ]]; then
                REF=$(conan inspect . --format json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[\"name\"]+\"/\"+d[\"version\"])")
                conan cache save "$REF" --file "/workspace/$ARTIFACT_NAME"
              fi
            '

      - name: Upload Linux artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: fletcher-protoc-linux
          path: fletcher-protoc-linux.tgz

  upload:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}
          tag-prefix: protoc-v

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: fletcher-protoc-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "fletcher-protoc-windows.tgz" \
            "fletcher-protoc-linux.tgz"
