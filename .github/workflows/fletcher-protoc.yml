name: fletcher-protoc

on:
  push:
    branches:
      - feature/fletcher-protoc
    paths:
      - "protoc/**"
      - ".github/workflows/fletcher-protoc.yml"
      - ".github/actions/install-msvc-tools/**"
  pull_request:
    paths:
      - "protoc/**"
      - ".github/workflows/fletcher-protoc.yml"
      - ".github/actions/install-msvc-tools/**"

jobs:
  windows:
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.4"

      - name: Install Conan
        run: pip install conan

      - name: Install Conan profiles
        shell: pwsh
        run: |
          $auth_header = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("x-access-token:${{ steps.generate-token.outputs.token }}"))
          git config --global http.extraHeader "Authorization: Basic $auth_header"
          conan config install https://github.com/eivacom/conan-configuration.git --type git

      - name: Build and test
        working-directory: protoc
        run: conan create . -pr:a=Visual-Studio-2022-v143-x64-Debug -o "&:run_tests=True"

  linux:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Build devcontainer image
        run: docker build -t fletcher-protoc-build protoc/.devcontainer

      - name: Build and test
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/protoc \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            fletcher-protoc-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan create . -pr:a=Ubuntu22-gcc-12-Debug -o '&:run_tests=True'"
