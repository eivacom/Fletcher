name: fletcher-protoc

on:
  push:
    branches:
      - feature/fletcher-protoc
    paths:
      - "protoc/**"
      - ".github/workflows/fletcher-protoc.yml"
      - ".github/actions/**"
  pull_request:
    paths:
      - "protoc/**"
      - ".github/workflows/fletcher-protoc.yml"
      - ".github/actions/**"

jobs:
  windows:
    runs-on:
      group: windows-server-core-ltsc2025
    steps:
      - uses: actions/checkout@v6

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14.4"

      - name: Install Conan
        run: pip install conan

      - name: Install Conan profiles
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          conan config install https://github.com/eivacom/conan-configuration.git

      - name: Build and test
        working-directory: protoc
        run: conan create . -pr:a=Visual-Studio-2022-v143-x64-Debug -o "&:run_tests=True"

  linux:
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6

      - name: Build devcontainer image
        run: docker build -t fletcher-protoc-build protoc/.devcontainer

      - name: Build and test
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/protoc \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=url.https://x-access-token:${{ github.token }}@github.com/.insteadOf \
            -e GIT_CONFIG_VALUE_0=https://github.com/ \
            fletcher-protoc-build \
            bash -c "conan config install https://github.com/eivacom/conan-configuration.git && \
                     conan create . -pr:a=Ubuntu22-gcc-12-Debug -o '&:run_tests=True'"
