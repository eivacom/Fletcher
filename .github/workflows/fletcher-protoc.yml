name: fletcher-protoc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "protoc/**"
      - ".github/workflows/fletcher-protoc.yml"
      - ".github/actions/install-msvc-tools/**"
      - ".github/actions/install-cmake/**"
      - ".github/actions/conan-bootstrap/**"
      - ".github/actions/check-version-not-published/**"
      - ".github/actions/detect-pr-changes/**"
      - ".github/actions/setup-devcontainer-image/**"
      - ".devcontainer/**"
      - "!**/*.md"
  push:
    tags:
      - 'protoc-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  # ── Skip the Windows build when a PR only changes .devcontainer/ files
  #    (Windows runs natively and doesn't consume the devcontainer image). ──
  detect-changes:
    runs-on:
      group: ubuntu_24.04_x64
    outputs:
      devcontainer_only: ${{ steps.detect.outputs.devcontainer_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/detect-pr-changes
        id: detect

  build-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.devcontainer_only != 'true'
    runs-on:
      group: windows-server-core-ltsc2025
    outputs:
      conan-ref: ${{ steps.conan-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}

      - name: Get package reference
        id: conan-ref
        shell: pwsh
        working-directory: protoc
        run: |
          $inspect = conan inspect . --format=json | ConvertFrom-Json
          echo "ref=$($inspect.name)/$($inspect.version)" >> $env:GITHUB_OUTPUT

      - name: Build and test
        working-directory: protoc
        run: conan create . --build=missing -pr:a=Visual-Studio-2022-v143-x64-Release -o "&:run_tests=True"

      - name: Export package from Conan cache
        working-directory: protoc
        run: conan cache save "${{ steps.conan-ref.outputs.ref }}" --file conan-pkg-windows.tgz

      - name: Upload package artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: conan-pkg-windows
          path: protoc/conan-pkg-windows.tgz
          retention-days: 1

  build-linux:
    needs: detect-changes
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .devcontainer
            .github

      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Set up devcontainer image
        uses: ./.github/actions/setup-devcontainer-image
        with:
          harbor_username: ${{ secrets.HARBOR_USERNAME }}
          harbor_password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build, test and export package
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/protoc \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     conan create . --build=missing -pr:a=Ubuntu22-gcc-12-Release -o '&:run_tests=True' && \
                     ref=\$(conan inspect . --format=json | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d[\"name\"]+\"/\"+d[\"version\"])') && \
                     conan cache save \"\$ref\" --file conan-pkg-linux.tgz"

      - name: Upload package artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: conan-pkg-linux
          path: protoc/conan-pkg-linux.tgz
          retention-days: 1

  # ── Upload — runs only on release tag pushes after both platforms pass ────
  upload:
    needs: [ build-windows, build-linux ]
    runs-on:
      group: ubuntu_24.04_x64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            protoc
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}
          tag-prefix: protoc-v

      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }}

      - name: Check package version is not already published
        uses: ./.github/actions/check-version-not-published
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}

      - name: Download Windows package artifact
        uses: actions/download-artifact@v7
        with:
          name: conan-pkg-windows

      - name: Download Linux package artifact
        uses: actions/download-artifact@v7
        with:
          name: conan-pkg-linux

      - name: Restore Windows package into Conan cache
        run: conan cache restore conan-pkg-windows.tgz

      - name: Restore Linux package into Conan cache
        run: conan cache restore conan-pkg-linux.tgz

      - name: Upload to Artifactory
        run: conan upload "${{ needs.build-windows.outputs.conan-ref }}" -r conan-eiva --confirm
