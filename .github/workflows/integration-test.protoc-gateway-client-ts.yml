name: integration-test.protoc-gateway-client-ts

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference. When set, this workflow
          skips its own setup-devcontainer job and uses the supplied
          image on the test job. Callers (e.g. pr.yml) pass the image
          they already built so we don't queue a second setup-devcontainer
          run for the same commit. Leave empty for standalone runs.
        required: false
        type: string
        default: ""

jobs:
  setup-devcontainer:
    if: ${{ inputs.devcontainer-image == '' }}
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  protoc-gateway-client-ts:
    needs: setup-devcontainer
    if: ${{ always() && needs.setup-devcontainer.result != 'failure' && needs.setup-devcontainer.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            protoc
            pubsub
            gateway-client-ts
            integration-tests/protoc-gateway-client-ts
            .conan-profiles
            .github

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image || needs.setup-devcontainer.outputs.image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build components and run integration tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            fletcher-build \
            bash -c "set -e && \
                     PROFILE=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release && \
                     for COMPONENT in core pubsub protoc; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/protoc-gateway-client-ts && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure + build' && \
                     cmake --preset conan-release && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::npm ci' && \
                     npm ci && \
                     echo '::endgroup::' && \
                     echo '::group::npm test' && \
                     npm test && \
                     echo '::endgroup::'"
