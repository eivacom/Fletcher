name: integration-test.protoc-gateway-client-ts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "core/**"
      - "protoc/**"
      - "pubsub/**"
      - "gateway-client-ts/**"
      - "integration-tests/protoc-gateway-client-ts/**"
      - ".github/workflows/integration-test.protoc-gateway-client-ts.yml"
      - ".github/actions/pull-devcontainer-image/**"
      - ".github/workflows/setup-devcontainer-image.yml"
      - ".devcontainer/**"
      - "!**/*.md"

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  protoc-gateway-client-ts:
    needs: setup-devcontainer
    runs-on:
      group: ubuntu_24.04_x64
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            protoc
            pubsub
            gateway-client-ts
            integration-tests/protoc-gateway-client-ts
            .devcontainer
            .github

      - name: Generate token for conan-configuration
        id: generate-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          owner: eivacom
          repositories: conan-configuration

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ needs.setup-devcontainer.outputs.image }}
          harbor-username: ${{ secrets.HARBOR_USERNAME }}
          harbor-password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build components and run integration tests
        run: |
          auth_header=$(echo -n "x-access-token:${{ steps.generate-token.outputs.token }}" | base64)
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            -e GIT_EXTRA_HEADER="Authorization: Basic $auth_header" \
            -e CONAN_LOGIN_USERNAME=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_USERNAME }} \
            -e CONAN_LOGIN_PASSWORD=${{ secrets.CONAN_EIVA_ARTIFACTORY_ROBOT_PASSWORD }} \
            fletcher-build \
            bash -c "set -e && \
                     git config --global http.extraHeader \"\$GIT_EXTRA_HEADER\" && \
                     conan config install https://github.com/eivacom/conan-configuration.git --type git && \
                     conan remote login conan-eiva \$CONAN_LOGIN_USERNAME -p \$CONAN_LOGIN_PASSWORD && \
                     PROFILE=Ubuntu22-gcc-12-Release && \
                     for COMPONENT in core pubsub protoc; do \
                       echo '::group::conan create '\$COMPONENT && \
                       (cd \$COMPONENT && conan create . --build=missing -pr:a=\$PROFILE) && \
                       echo '::endgroup::'; \
                     done && \
                     cd integration-tests/protoc-gateway-client-ts && \
                     echo '::group::conan install integration test' && \
                     conan install . --build=missing -pr:a=\$PROFILE && \
                     echo '::endgroup::' && \
                     echo '::group::cmake configure + build' && \
                     cmake --preset conan-release && \
                     cmake --build --preset conan-release && \
                     echo '::endgroup::' && \
                     echo '::group::npm ci' && \
                     npm ci && \
                     echo '::endgroup::' && \
                     echo '::group::npm test' && \
                     npm test && \
                     echo '::endgroup::'"

  # ── PR Gate ───────────────────────────────────────────────────────────────
  pr_gate:
    needs: [ setup-devcontainer, protoc-gateway-client-ts ]
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/pr-gate
        with:
          results: "${{ needs.setup-devcontainer.result }},${{ needs.protoc-gateway-client-ts.result }}"
