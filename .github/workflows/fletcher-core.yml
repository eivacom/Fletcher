name: fletcher-core

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'core-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/setup-devcontainer-image.yml
    secrets: inherit

  build-windows:
    runs-on: windows-latest
    outputs:
      conan-ref: ${{ steps.conan-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            .github

      - name: Get package reference
        id: conan-ref
        shell: pwsh
        working-directory: core
        run: |
          $inspect = conan inspect . --format=json | ConvertFrom-Json
          echo "ref=$($inspect.name)/$($inspect.version)" >> $env:GITHUB_OUTPUT

      - name: Install MSVC tools
        uses: ./.github/actions/install-msvc-tools

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - uses: ./.github/actions/conan-build-windows
        with:
          component: core
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_PASSWORD }}

      - name: Export package from Conan cache
        working-directory: core
        run: conan cache save "${{ steps.conan-ref.outputs.ref }}" --file conan-pkg.tgz

      - name: Upload package artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: conan-pkg
          path: core/conan-pkg.tgz
          retention-days: 1

  build-linux:
    needs: setup-devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            .github

      - uses: ./.github/actions/conan-build-linux
        with:
          component: core
          devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_PASSWORD }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  # ── Upload — runs only after both platforms pass ───────────────────────────
  upload:
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            core
            .github

      - name: Verify tag version matches conanfile.py version
        uses: ./.github/actions/verify-tag-version
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}
          tag-prefix: core-v

      - name: Bootstrap Conan
        uses: ./.github/actions/conan-bootstrap
        with:
          github-app-client-id: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_CLIENT_ID }}
          github-app-private-key: ${{ secrets.GH_EIVA_ROBOT_APPLICATION_KEY }}
          conan-eiva-username: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_USERNAME }}
          conan-eiva-password: ${{ secrets.CONAN_EIVA_ARTIFACTORY_FLETCHER_ROBOT_PASSWORD }}

      - name: Check package version is not already published
        uses: ./.github/actions/check-version-not-published
        with:
          conan-ref: ${{ needs.build-windows.outputs.conan-ref }}

      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: conan-pkg

      - name: Restore package into Conan cache
        run: conan cache restore conan-pkg.tgz

      - name: Upload to Artifactory
        run: conan upload "${{ needs.build-windows.outputs.conan-ref }}" -r conan-eiva --confirm
