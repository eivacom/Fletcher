#
# Release orchestration for @eiva/fletcher-gateway-client. Invokes
# ci.gateway-client.yml to build and test, publishes the package to
# npmjs.com, then creates a GitHub Release with a link to the npm page.
#
# Triggers:
#   * push: tags 'gateway-client-v*'     — real release.

name: cd.gateway-client

on:
  push:
    tags:
      - 'gateway-client-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  build-and-test:
    uses: ./.github/workflows/ci.gateway-client.yml
    secrets: inherit

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway-client-ts
            .github

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag version matches package.json version
        uses: ./.github/actions/verify-tag-version-npm
        with:
          package-json: gateway-client-ts/package.json
          tag-prefix: gateway-client-v

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: gateway-client-ts
          path: gateway-client-ts/dist

      - name: Resolve dist-tag
        id: dist-tag
        working-directory: gateway-client-ts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            PRE=$(echo "$VERSION" | sed 's/^[0-9]*\.[0-9]*\.[0-9]*-//' | cut -d. -f1)
            echo "tag=$PRE" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: gateway-client-ts
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#gateway-client-v}"
          NOTES=$(printf "## npm\n\nhttps://www.npmjs.com/package/@eiva/fletcher-gateway-client/v/%s\n" "${VERSION}")
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --notes "${NOTES}"
