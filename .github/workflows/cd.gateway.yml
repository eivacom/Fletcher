#
# Release orchestration for fletcher-gateway. Owns the setup-devcontainer
# step, invokes ci.gateway.yml with the resulting image to build and
# upload per-platform gateway binaries, and creates the GitHub Release.
# ci.gateway.yml is also called from ci.pr.yml — build/test logic is
# shared so PR and release runs use the same source of truth.
#
# Gateway's version lives in gateway/VERSION (a plain text file).
# CMake reads it to set project(VERSION ...), embed Windows VERSIONINFO
# in gateway.exe, and provide the --version CLI flag's output. The
# upload job below verifies that the pushed tag matches that file.
#
# Triggers:
#   * push: tags 'gateway-v*'     — real release.

name: gateway

on:
  push:
    tags:
      - 'gateway-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  setup-devcontainer:
    uses: ./.github/workflows/ci.setup-devcontainer-image.yml
    secrets: inherit

  release:
    needs: setup-devcontainer
    uses: ./.github/workflows/ci.gateway.yml
    with:
      devcontainer-image: ${{ needs.setup-devcontainer.outputs.image }}
    secrets: inherit

  upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway

      - name: Verify tag version matches gateway/VERSION
        shell: bash
        run: |
          file_version=$(tr -d '[:space:]' < gateway/VERSION)
          tag_version="${GITHUB_REF##refs/tags/gateway-v}"
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::Tag version '$tag_version' does not match gateway/VERSION '$file_version' (tag: $GITHUB_REF)"
            exit 1
          fi
          echo "Tag and gateway/VERSION match: $file_version"

      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: gateway-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "gateway.exe" \
            "gateway-linux.tar.gz"
