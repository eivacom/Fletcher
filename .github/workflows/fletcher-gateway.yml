name: fletcher-gateway

concurrency:
  group: fletcher-gateway-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      devcontainer-image:
        description: >-
          Pre-built devcontainer image reference (e.g.
          dockerrepo.eiva.com/fletcher/devcontainer:<sha>). The caller is
          responsible for invoking setup-devcontainer-image.yml; this
          workflow only consumes the resulting image. pr.yml passes the
          image it built once and shares across all callers; the
          release-gateway.yml wrapper does the same for tag-push releases.
        required: true
        type: string

# Gateway is distributed as a standalone executable (no Conan package,
# no public headers). On tag-push the gateway binary is packaged per
# platform and uploaded as a workflow artifact; release-gateway.yml's
# upload job consumes those artifacts to create the GitHub Release.
# End-to-end coverage of the gateway against gateway-client-ts lives
# in the gateway-end-to-end integration-test workflow.

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            core
            pubsub
            .github
            .conan-profiles

      - name: Install CMake
        uses: ./.github/actions/install-cmake

      - name: Install Conan
        uses: ./.github/actions/conan-install

      # Gateway's conanfile requires fletcher-core and fletcher-pubsub via version
      # ranges. Neither is on any Conan remote, so they must be in the local cache
      # before `conan install` can resolve them.
      - name: Build fletcher-core, fletcher-pubsub (dependencies)
        shell: bash
        working-directory: gateway
        run: |
          conan create ../core --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release
          conan create ../pubsub --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release

      # `conan build .` dispatches cmake configure / build / test via the
      # conanfile's build() method, picking the right preset for the
      # generator in use. Calling cmake --preset conan-release directly
      # breaks on Windows (multi-config VS generator only creates the
      # conan-default configure preset, with conan-release reserved for
      # the build step), while on Linux single-config generators the
      # opposite is true. Letting Conan dispatch sidesteps the asymmetry.
      - name: Install, build, and test
        shell: bash
        working-directory: gateway
        run: |
          conan install . --build=missing -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"
          conan build . -pr:a=../.conan-profiles/Windows-msvc194-x86_64-Release -o "&:run_tests=True"

      # Binary path per gateway/README.md: build/Release/gateway.exe.
      # Staged at workspace root so the artifact contains just gateway.exe
      # (upload-artifact preserves any leading directories from the path).
      - name: Stage gateway.exe
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: cp gateway/build/Release/gateway.exe gateway.exe

      - name: Upload Windows binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gateway-windows
          path: gateway.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            gateway
            core
            pubsub
            .github
            .conan-profiles

      - name: Pull devcontainer image
        uses: ./.github/actions/pull-devcontainer-image
        with:
          image: ${{ inputs.devcontainer-image }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build dependencies, install, build, and test
        shell: bash
        env:
          ARTIFACT_NAME: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'gateway-linux.tar.gz' || '' }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/gateway \
            -e ARTIFACT_NAME="$ARTIFACT_NAME" \
            fletcher-build \
            bash -c '
              set -e
              # fletcher-core/pubsub must be in the local cache before gateway can
              # resolve them (no Conan remote hosts the fletcher-* packages).
              conan create ../core --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              conan create ../pubsub --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release
              conan install . --build=missing -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              conan build . -pr:a=/workspace/.conan-profiles/Linux-gcc13-x86_64-Release -o "&:run_tests=True"
              # Binary path per gateway/README.md: build/Release/gateway. Packaged
              # inside docker so the resulting tarball is readable by the runner user.
              if [[ -n "$ARTIFACT_NAME" ]]; then
                tar -czf "/workspace/$ARTIFACT_NAME" -C build/Release gateway
              fi
            '

      - name: Upload Linux binary
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gateway-linux
          path: gateway-linux.tar.gz
          retention-days: 5
