syntax = "proto3";
package integration;

import "geoarrow/geoarrow.proto";

// Test message that exercises all Phase 1 GeoArrow types.
message VehicleTrack {
    string vehicle_id = 1;
    geoarrow.Point last_position = 2;
    geoarrow.LineString route = 3;
    geoarrow.Box bounding_box = 4;
    optional geoarrow.PointZ altitude_point = 5;
    geoarrow.MultiPoint waypoints = 6;
}
